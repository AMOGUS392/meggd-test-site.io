<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVG Brawlers: Cinematic Boss Update</title>
    <style>
        :root { --grass: #3e8e41; --floor1: #5d4037; --floor2: #4e342e; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--grass); font-family: sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        /* Меню */
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; z-index: 1000; color: white; text-align: center; overflow-y: auto; padding-top: 30px; padding-bottom: 50px;}
        #menu-coins { color: gold; font-size: 24px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px gold; }
        .char-grid { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; padding: 10px; max-width: 400px; }
        .char-card { background: #222; padding: 15px; border-radius: 10px; text-align: center; border: 2px solid #555; width: 90px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .char-card svg { width: 60px; height: 60px; margin-bottom: 5px; }
        .char-card p { margin: 0 0 10px 0; font-size: 14px; font-weight: bold; }
        .buy-btn { background: orange; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; width: 100%; margin-top: auto; }
        .buy-btn.unlocked { background: #4caf50; }
        
        /* Экраны */
        .screen-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; font-weight: bold; text-shadow: 2px 2px 0 #000; }
        #death-screen { background: rgba(200, 0, 0, 0.7); font-size: 30px; }
        #hack-screen { background: rgba(150, 0, 0, 0.95); z-index: 9999; font-size: 24px; text-align: center; padding: 20px;}
        .reload-btn { margin-top: 20px; padding: 15px 30px; background: black; color: red; border: 2px solid red; font-size: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; }

        /* Игровой мир */
        #game-container { position: absolute; width: 100%; height: 100%; display: none; }
        #world { position: absolute; transform-origin: top left; }
        #hud-coins { position: absolute; top: 20px; left: 20px; color: gold; font-weight: bold; font-size: 20px; z-index: 100; text-shadow: 1px 1px 2px #000; display: none; }
        
        .entity { position: absolute; transform: translate(-50%, -50%); transition: opacity 0.3s; pointer-events: none; z-index: 10; }
        .health-bar { position: absolute; top: -15px; left: -10px; width: 40px; height: 5px; background: red; border-radius: 3px; border: 1px solid black; }
        .health-fill { height: 100%; background: #00ff00; width: 100%; border-radius: 3px; transition: width 0.2s; }
        .emotion { position: absolute; top: -50px; left: 50%; transform: translateX(-50%); font-size: 14px; font-weight: bold; background: rgba(0,0,0,0.8); border: 2px solid white; padding: 4px 8px; border-radius: 10px; color: white; white-space: nowrap; opacity: 0; transition: opacity 0.2s; z-index: 20; box-shadow: 0 0 10px rgba(0,0,0,0.5);}
        
        .hand { transition: transform 0.1s ease-out; transform-origin: center; }
        .punch-l .hand-l { transform: translateY(-20px) scale(1.3); }
        .punch-r .hand-r { transform: translateY(-20px) scale(1.3); }
        .grab-pose .hand-l { transform: translate(10px, -15px); }
        .grab-pose .hand-r { transform: translate(-10px, -15px); }

        .building { position: absolute; background: var(--floor1); border: 4px solid #3e2723; border-radius: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .building.floor2-active { background: var(--floor2); border-color: #261714; }
        .roof { position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px; background: #6d4c41; transition: opacity 0.5s; z-index: 20; border-radius: 5px; }
        .stairs { position: absolute; background: repeating-linear-gradient(0deg, #999, #999 5px, #777 5px, #777 10px); border: 2px solid #555; }
        .furniture { position: absolute; width: 25px; height: 25px; background: #8d6e63; border-radius: 4px; border: 2px solid #5d4037; transform: translate(-50%, -50%); transition: opacity 0.2s; z-index: 5;}
        .broken { opacity: 0; }

        /* Улучшенные эффекты */
        .projectile { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); z-index: 15; box-shadow: 0 0 15px currentColor; }
        .effect { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); animation: pop 0.4s ease-out forwards; pointer-events: none; z-index: 15; box-shadow: inset 0 0 30px currentColor, 0 0 30px currentColor; }
        @keyframes pop { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1); } }
        
        .beam { position: absolute; opacity: 0.8; transform-origin: left center; z-index: 14; box-shadow: 0 0 30px currentColor; animation: pulseBeam 0.2s infinite alternate; }
        @keyframes pulseBeam { 0% { opacity: 0.7; filter: brightness(1); } 100% { opacity: 1; filter: brightness(1.5); } }

        .dmg-text { position: absolute; font-weight: bold; font-size: 20px; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; animation: floatUp 0.8s forwards; pointer-events: none; z-index: 30; transform: translate(-50%, -50%); }
        @keyframes floatUp { 0% { margin-top: 0; opacity: 1; transform: translate(-50%, -50%) scale(1.5); } 100% { margin-top: -60px; opacity: 0; transform: translate(-50%, -50%) scale(1); } }

        /* UI и Чат Меню */
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 100; display: none; }
        #joystick-area { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.15); border-radius: 50%; pointer-events: auto; border: 2px solid rgba(255,255,255,0.3); }
        #joystick-knob { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.8); border-radius: 50%; top: 35px; left: 35px; pointer-events: none; box-shadow: 0 0 10px rgba(0,0,0,0.5);}
        
        .btn { position: absolute; background: rgba(0,0,0,0.7); color: white; border-radius: 50%; border: 2px solid white; font-weight: bold; display: flex; align-items: center; justify-content: center; pointer-events: auto; box-shadow: 0 5px 10px rgba(0,0,0,0.5);}
        .btn:active { background: rgba(255,255,255,0.9); color: black; }
        .btn.cooldown { background: red !important; opacity: 0.5; color: white; }
        
        #action-btn { bottom: 30px; right: 140px; width: 70px; height: 70px; background: rgba(255, 165, 0, 0.9); font-size: 14px; border-color: gold; }
        #chat-btn { bottom: 120px; right: 140px; width: 55px; height: 55px; background: rgba(50, 150, 255, 0.9); font-size: 20px; border-color: lightblue; }
        #ab1 { bottom: 20px; right: 60px; width: 55px; height: 55px; }
        #ab2 { bottom: 85px; right: 35px; width: 55px; height: 55px; }
        #ab3 { bottom: 150px; right: 20px; width: 55px; height: 55px; }
        
        #chat-menu { position: absolute; bottom: 100px; right: 100px; background: rgba(0,0,0,0.85); padding: 10px; border-radius: 10px; display: none; grid-template-columns: 1fr; gap: 8px; z-index: 200; pointer-events: auto; border: 2px solid #444; }
        .chat-item { background: #333; color: white; border: 1px solid #666; padding: 8px 15px; border-radius: 5px; font-weight: bold; font-size: 14px; cursor: pointer; text-align: center;}
        .chat-item:active { background: #555; }

        .stunned { filter: grayscale(100%) sepia(100%) hue-rotate(-50deg) saturate(500%); animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(calc(-50% + 2px), calc(-50% + 2px)); } 50% { transform: translate(calc(-50% - 2px), calc(-50% - 2px)); } 100% { transform: translate(calc(-50% + 2px), calc(-50% + 2px)); } }
    </style>
</head>
<body>

<div id="menu">
    <h2>SVG Brawlers</h2>
    <div id="menu-coins">Монеты: 0 💰</div>
    <div class="char-grid" id="char-select"></div>
</div>

<div id="death-screen" class="screen-overlay">
    <div>ВЫ ПОГИБЛИ</div>
    <div style="font-size: 16px; margin-top: 10px;">Возрождение...</div>
</div>

<div id="hack-screen" class="screen-overlay">
    <h1>⚠️ Hacking Detector ⚠️</h1>
    <p>Обнаружено вмешательство в данные игры!</p>
    <button class="reload-btn" onclick="location.reload()">Перезагрузить сайт</button>
</div>

<div id="game-container">
    <div id="world">
        <div id="environment"></div>
        <div id="entities"></div>
    </div>
</div>

<div id="hud-coins">0 💰</div>

<div id="ui">
    <div id="joystick-area"><div id="joystick-knob"></div></div>
    <div class="btn" id="action-btn">Действие</div>
    <div class="btn" id="chat-btn">💬</div>
    <div id="chat-menu">
        <div class="chat-item" onclick="sendChat('Привет! 👋', 'greet')">Привет! 👋</div>
        <div class="chat-item" onclick="sendChat('Го в команду! 🤝', 'team')">В команду! 🤝</div>
        <div class="chat-item" onclick="sendChat('Го ПВП (Друг) 🛡️', 'pvp-friend')">ПВП (Друг) 🛡️</div>
        <div class="chat-item" onclick="sendChat('Го ПВП (СМЕРТЬ) ☠️', 'pvp-death')">ПВП (Смерть) ☠️</div>
        <div class="chat-item" onclick="sendChat('Помогите! 🆘', 'help')">Помогите! 🆘</div>
        <div class="chat-item" onclick="sendChat('Отстань! 💢', 'angry')">Отстань! 💢</div>
    </div>
    <div class="btn" id="ab1">1</div>
    <div class="btn" id="ab2">2</div>
    <div class="btn" id="ab3">3</div>
</div>

<script>
// ==========================================
// ANTI-HACK SYSTEM
// ==========================================
const ServerState = { coins: 0, unlocked: ['sans', 'dustdust'], prices: { sans: 0, dustdust: 0, gojo: 300, sukuna: 500, saitama: 800, dustdustdust: 2000 } };
let clientCoins = 0, clientUnlocked = ['sans', 'dustdust'], isHacked = false;

try {
    if (localStorage.getItem('brw_c')) ServerState.coins = parseInt(localStorage.getItem('brw_c'));
    if (localStorage.getItem('brw_u')) ServerState.unlocked = JSON.parse(localStorage.getItem('brw_u'));
    syncClient();
} catch (e) {}

function syncClient() { clientCoins = ServerState.coins; clientUnlocked =[...ServerState.unlocked]; updateCoinUI(); }
function saveServer() { try { localStorage.setItem('brw_c', ServerState.coins); localStorage.setItem('brw_u', JSON.stringify(ServerState.unlocked)); } catch (e) {} }

function serverEvent_addCoins(amount) {
    if (amount !== 50) return triggerHack();
    ServerState.coins += amount; syncClient(); saveServer();
}

function serverEvent_buy(charKey) {
    let price = ServerState.prices[charKey];
    if (ServerState.coins >= price && !ServerState.unlocked.includes(charKey)) {
        ServerState.coins -= price; ServerState.unlocked.push(charKey);
        syncClient(); saveServer(); return true;
    } return false;
}

setInterval(() => {
    if (isHacked) return;
    if (clientCoins !== ServerState.coins || clientUnlocked.length !== ServerState.unlocked.length) triggerHack();
    for(let c of clientUnlocked) if (!ServerState.unlocked.includes(c)) triggerHack();
}, 500);

function triggerHack() { if (isHacked) return; isHacked = true; gameActive = false; document.getElementById('hack-screen').style.display = 'flex'; }
function updateCoinUI() { document.getElementById('menu-coins').innerText = `Монеты: ${clientCoins} 💰`; document.getElementById('hud-coins').innerText = `${clientCoins} 💰`; }

// ==========================================
// CAMERA DYNAMICS (ZOOM & SHAKE)
// ==========================================
let camScale = 1.0, targetCamScale = 1.0;
let camShake = 0;

// ==========================================
// AUDIO SYSTEM
// ==========================================
const AudioContext = window.AudioContext || window.webkitAudioContext;
let actx = null;
function playSfx(type) {
    if (!actx) actx = new AudioContext(); if (actx.state === 'suspended') actx.resume();
    const osc = actx.createOscillator(), gain = actx.createGain();
    osc.connect(gain); gain.connect(actx.destination); const now = actx.currentTime;
    
    if (type === 'punch') {
        osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
        gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'magic') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.linearRampToValueAtTime(800, now + 0.3);
        gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
    } else if (type === 'coin') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.linearRampToValueAtTime(1200, now + 0.1);
        gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'glass') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
        gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
    } else if (type === 'explosion') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(10, now + 0.8);
        gain.gain.setValueAtTime(0.8, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
        osc.start(now); osc.stop(now + 0.8);
    } else if (type === 'beam') {
        osc.type = 'square'; osc.frequency.setValueAtTime(50, now); osc.frequency.linearRampToValueAtTime(200, now + 0.5);
        gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
    }
}

// ==========================================
// CHARACTER DATA
// ==========================================
const getSvg = (color, decor) => `
<svg viewBox="0 0 100 100" width="50" height="50">
    <rect x="25" y="25" width="50" height="50" rx="8" fill="${color}" stroke="#000" stroke-width="2"/>
    ${decor}
    <circle cx="20" cy="70" r="12" fill="${color}" stroke="#000" stroke-width="2" class="hand hand-l"/>
    <circle cx="80" cy="70" r="12" fill="${color}" stroke="#000" stroke-width="2" class="hand hand-r"/>
</svg>`;

const charsData = {
    sans: { name: "Sans", speed: 2.2, hp: 400, price: ServerState.prices.sans, svg: getSvg('#2196F3', `<circle cx="40" cy="45" r="4" fill="#fff"/><circle cx="60" cy="45" r="4" fill="#0ff"/>`), ab:[{ name: "Кости", cd: 40 }, { name: "ТП", cd: 120 }, { name: "Бластер", cd: 200 }] },
    dustdust: { name: "Dust", speed: 2.4, hp: 500, price: ServerState.prices.dustdust, svg: getSvg('#424242', `<circle cx="40" cy="45" r="4" fill="red"/><circle cx="60" cy="45" r="4" fill="red"/><path d="M 35 60 Q 50 65 65 60" stroke="#fff" stroke-width="3" fill="none"/><path d="M 25 25 L 75 25 L 50 10 Z" fill="#212121"/>`), ab:[{ name: "Кр.Кости", cd: 60 }, { name: "Психо", cd: 180 }, { name: "Хаос", cd: 250 }] },
    gojo: { name: "Gojo", speed: 2.5, hp: 600, price: ServerState.prices.gojo, svg: getSvg('#111', `<path d="M 25 25 Q 50 5 75 25" fill="#fff"/><rect x="25" y="35" width="50" height="15" fill="#000"/>`), ab:[{ name: "Красный", cd: 80 }, { name: "Синий", cd: 100 }, { name: "Фиолет.", cd: 300 }] },
    sukuna: { name: "Sukuna", speed: 2.3, hp: 700, price: ServerState.prices.sukuna, svg: getSvg('#fff', `<path d="M 25 25 L 40 10 L 50 25 L 60 10 L 75 25" fill="#ffb6c1"/>`), ab:[{ name: "Рассеч.", cd: 50 }, { name: "Расщеп.", cd: 90 }, { name: "Стрела", cd: 220 }] },
    saitama: { name: "Saitama", speed: 2.8, hp: 800, price: ServerState.prices.saitama, svg: getSvg('yellow', `<circle cx="50" cy="40" r="15" fill="#ffe0bd"/>`), ab:[{ name: "Удар", cd: 30 }, { name: "Серия", cd: 120 }, { name: "Серьез.", cd: 250 }] },
    dustdustdust: { name: "Dustx3", speed: 3.0, hp: 12000, price: ServerState.prices.dustdustdust, svg: getSvg('#2a0000', `<circle cx="40" cy="45" r="3" fill="red"/><circle cx="60" cy="45" r="3" fill="red"/><path d="M 30 60 Q 50 75 70 60" stroke="#f00" stroke-width="4" fill="none"/><path d="M 25 25 L 75 25 L 50 5 Z" fill="#000"/>`), ab:[{ name: "Волна", cd: 50 }, { name: "Взрыв", cd: 150 }, { name: "Конец", cd: 300 }] }
};

// ==========================================
// MENU RENDER
// ==========================================
function renderMenu() {
    const charSelect = document.getElementById('char-select'); charSelect.innerHTML = '';
    for (let key in charsData) {
        let card = document.createElement('div'); card.className = 'char-card';
        let isUnl = clientUnlocked.includes(key);
        let btnText = isUnl ? 'ИГРАТЬ' : `${charsData[key].price} 💰`;
        let btnClass = isUnl ? 'buy-btn unlocked' : 'buy-btn';
        card.innerHTML = `${charsData[key].svg}<p>${charsData[key].name}</p><button class="${btnClass}">${btnText}</button>`;
        card.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (isUnl) { if (!ServerState.unlocked.includes(key)) return triggerHack(); startGame(key); } 
            else { if (serverEvent_buy(key)) { renderMenu(); playSfx('coin'); } else if (clientCoins >= charsData[key].price) triggerHack(); else alert('Недостаточно монет!'); }
        });
        charSelect.appendChild(card);
    }
}
renderMenu();

// ==========================================
// GLOBALS & WORLD
// ==========================================
let gameActive = false, player = null, entities = [], buildings =[], furnitures =[], projectiles =[];
const worldSize = 2000;
let joystick = { active: false, dx: 0, dy: 0, dirX: 0, dirY: 0, lastDirX: 1, lastDirY: 0 };
let nextTeamId = 1;

function generateWorld() {
    const env = document.getElementById('environment');
    env.innerHTML = ''; buildings = []; furnitures =[];
    const bData =[ {x: 300, y: 300, w: 300, h: 250}, {x: 1200, y: 200, w: 400, h: 300}, {x: 400, y: 1200, w: 300, h: 400}, {x: 1300, y: 1300, w: 300, h: 300} ];

    bData.forEach(b => {
        let bEl = document.createElement('div'); bEl.className = 'building';
        bEl.style.left = b.x + 'px'; bEl.style.top = b.y + 'px'; bEl.style.width = b.w + 'px'; bEl.style.height = b.h + 'px';
        let stairs = document.createElement('div'); stairs.className = 'stairs';
        stairs.style.left = '10px'; stairs.style.top = '10px'; stairs.style.width = '50px'; stairs.style.height = '50px';
        bEl.appendChild(stairs);
        let roof = document.createElement('div'); roof.className = 'roof'; bEl.appendChild(roof);
        env.appendChild(bEl);
        buildings.push({ ...b, el: bEl, roofEl: roof, stairsArea: {x: b.x+10, y: b.y+10, w: 50, h: 50} });

        for(let j=0; j<8; j++) {
            let z = j < 4 ? 0 : 1;
            let fx = b.x + 80 + Math.random() * (b.w - 100), fy = b.y + 20 + Math.random() * (b.h - 60);
            let fEl = document.createElement('div'); fEl.className = 'furniture';
            fEl.style.left = fx + 'px'; fEl.style.top = fy + 'px'; if(z===1) fEl.style.display = 'none';
            env.appendChild(fEl); furnitures.push({ id: Math.random(), x: fx, y: fy, z: z, el: fEl, broken: false, respawn: 0, type: 'furn' });
        }
    });
}

// ==========================================
// ENTITY & AI
// ==========================================
class Entity {
    constructor(x, y, type, isBot) {
        this.x = x; this.y = y; this.z = 0;
        this.type = type; this.isBot = isBot; this.data = charsData[type];
        this.hp = this.data.hp; this.maxHp = this.data.hp; this.speed = this.data.speed;
        this.cooldowns =[0, 0, 0]; this.stunTimer = 0; this.heldBy = null; this.holding = null;
        this.vx = 0; this.vy = 0; this.state = 'NORMAL';
        
        this.teamId = isBot ? 0 : -1; this.target = null;
        this.personality = isBot ?['AGGRESSIVE', 'CHILL', 'SOCIAL', 'LONER'][Math.floor(Math.random()*4)] : 'PLAYER';
        this.emotionTimer = 0; this.socialTarget = null;
        
        this.el = document.createElement('div'); this.el.className = 'entity';
        this.el.innerHTML = `<div class="emotion"></div><div class="health-bar"><div class="health-fill"></div></div>${this.data.svg}`;
        this.hpFill = this.el.querySelector('.health-fill'); this.emoEl = this.el.querySelector('.emotion');
        document.getElementById('entities').appendChild(this.el);
        this.updatePos();
    }

    showEmotion(emo) { this.emoEl.innerText = emo; this.emoEl.style.opacity = '1'; this.emotionTimer = 180; }

    updatePos() {
        if (this.heldBy) { this.x = this.heldBy.x; this.y = this.heldBy.y - 20; this.z = this.heldBy.z; }
        this.el.style.transform = `translate(calc(${this.x}px - 50%), calc(${this.y}px - 50%))`;
        let targetZ = player ? player.z : 0;
        this.el.style.opacity = (!player || this.z === targetZ) ? '1' : '0.2';
        if (this.stunTimer > 0) this.el.classList.add('stunned'); else this.el.classList.remove('stunned');
        if (this.emotionTimer > 0) { this.emotionTimer--; if(this.emotionTimer <= 0) this.emoEl.style.opacity = '0'; }
    }

    damage(amount, attacker = null) {
        if (this.state === 'DEAD' || isHacked) return;

        // Логика дружественного ПВП
        if (attacker && (attacker.personality === 'PVP_FRIENDLY' || this.personality === 'PVP_FRIENDLY')) {
            if (this.hp - amount <= 50) {
                this.hp = 50; this.showEmotion('❤️'); attacker.showEmotion('❤️');
                this.hp = this.maxHp; attacker.hp = attacker.maxHp;
                this.hpFill.style.width = '100%'; if (attacker.hpFill) attacker.hpFill.style.width = '100%';
                if (this.personality === 'PVP_FRIENDLY') this.personality = 'SOCIAL';
                if (attacker.personality === 'PVP_FRIENDLY') attacker.personality = 'SOCIAL';
                this.target = null; attacker.target = null; return;
            }
        }

        this.hp -= amount; spawnText(this.x, this.y, amount, 'white');
        if (amount > 80) this.stunTimer = 60; // Тяжелый удар оглушает
        
        if (attacker && attacker !== this && this.hp > 0) {
            this.target = attacker;
            if (this.teamId > 0) {
                entities.forEach(e => {
                    if (e.teamId === this.teamId && e !== this && e.state !== 'DEAD') {
                        e.target = attacker; if(Math.random() < 0.5) e.showEmotion('🛡️');
                    }
                });
            }
        }
        
        if (this.hp <= 0) {
            this.hp = 0; this.state = 'DEAD'; this.stunTimer = 180;
            if (this === player) {
                document.getElementById('death-screen').style.display = 'flex';
                if (this.holding) this.holding.heldBy = null;
                setTimeout(() => {
                    this.hp = this.maxHp; this.stunTimer = 0; this.state = 'NORMAL';
                    this.x = worldSize/2; this.y = worldSize/2 + 200; this.z = 0;
                    this.hpFill.style.width = '100%'; switchFloor(0); document.getElementById('death-screen').style.display = 'none';
                }, 3000);
            } else {
                serverEvent_addCoins(50); spawnText(this.x, this.y, "+50 💰", "gold"); playSfx('coin');
                setTimeout(() => {
                    this.el.remove(); if (this.holding) this.holding.heldBy = null;
                    entities = entities.filter(e => e !== this);
                    setTimeout(() => spawnBot(), 3000);
                }, 3000);
            }
        }
        this.hpFill.style.width = (this.hp / this.maxHp * 100) + '%';
        if(amount > 0) playSfx('punch');
    }

    anim(type) { this.el.classList.add(type); setTimeout(() => this.el.classList.remove(type), 150); }

    throwHeld(dirX, dirY) {
        if (!this.holding) return; let obj = this.holding; obj.heldBy = null; this.holding = null;
        obj.state = 'THROWN'; obj.vx = dirX * 20; obj.vy = dirY * 20;
        this.anim('punch-r'); playSfx('magic'); this.el.classList.remove('grab-pose');
    }

    updateAI() {
        if (!this.isBot || this.stunTimer > 0 || this.heldBy || this.state === 'DEAD') return;
        if (this.target && this.target.state === 'DEAD') this.target = null;
        
        if (this.target) {
            let dx = this.target.x - this.x, dy = this.target.y - this.y;
            let dist = Math.hypot(dx, dy) || 1; let dirX = dx/dist, dirY = dy/dist;
            if (this.holding) { this.throwHeld(dirX, dirY); return; }
            if (dist > 80) this.move(dirX, dirY); else if (dist < 50) this.move(-dirX, -dirY);
            for(let i=0; i<3; i++) if (this.cooldowns[i] <= 0 && dist < 400 && Math.random() < 0.05) castAbility(this, i, dirX, dirY);
            return;
        }

        if (this.personality === 'AGGRESSIVE') {
            if (Math.random() < 0.005) { this.showEmotion('🤬'); this.target = entities.find(e => e !== this && e.z === this.z && e.state !== 'DEAD'); } 
            else this.move((Math.random()-0.5), (Math.random()-0.5));
        } else if (this.personality === 'CHILL') {
            if (!this.socialTarget) { let b = buildings[Math.floor(Math.random()*buildings.length)]; this.socialTarget = {x: b.x + b.w/2, y: b.y + b.h/2}; }
            let dist = Math.hypot(this.socialTarget.x - this.x, this.socialTarget.y - this.y);
            if (dist > 20) this.move((this.socialTarget.x - this.x)/dist, (this.socialTarget.y - this.y)/dist); else if (Math.random() < 0.01) this.showEmotion('💤');
        } else if (this.personality === 'SOCIAL') {
            if (!this.socialTarget || this.socialTarget.state === 'DEAD') this.socialTarget = entities.find(e => e.isBot && e !== this && e.personality !== 'AGGRESSIVE' && e.z === this.z && e.state !== 'DEAD' && (e.teamId === 0 || e.teamId === this.teamId));
            if (this.socialTarget) {
                let dist = Math.hypot(this.socialTarget.x - this.x, this.socialTarget.y - this.y);
                if (dist > 60) this.move((this.socialTarget.x - this.x)/dist, (this.socialTarget.y - this.y)/dist);
                else {
                    if (Math.random() < 0.02) {
                        this.showEmotion('💬');
                        if (this.teamId === 0 && this.socialTarget.teamId === 0) {
                            this.teamId = nextTeamId++; this.socialTarget.teamId = this.teamId; this.showEmotion('🤝'); this.socialTarget.showEmotion('🤝');
                        } else if (this.teamId > 0 && this.socialTarget.teamId === this.teamId) {
                            if (Math.random() < 0.05) { this.showEmotion('💢'); this.socialTarget.showEmotion('💢'); this.teamId = 0; this.socialTarget.teamId = 0; }
                        }
                    }
                }
            } else this.move((Math.random()-0.5), (Math.random()-0.5));
        } else this.move((Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5);
    }

    move(dx, dy) {
        if (this.stunTimer > 0 || this.heldBy || this.state === 'DEAD') return;
        let nx = this.x + dx * this.speed, ny = this.y + dy * this.speed;
        if (this.z === 0) { nx = Math.max(25, Math.min(worldSize-25, nx)); ny = Math.max(25, Math.min(worldSize-25, ny)); }
        if (this === player) checkStairs(nx, ny);
        this.x = nx; this.y = ny;
    }
}

function spawnBot() {
    let pool = Object.keys(charsData).filter(k => k !== 'dustdustdust');
    let key = pool[Math.floor(Math.random() * pool.length)];
    let rx = 100 + Math.random() * (worldSize - 200), ry = 100 + Math.random() * (worldSize - 200);
    entities.push(new Entity(rx, ry, key, true));
}

// ==========================================
// ABILITIES & EFFECTS (Cinematic)
// ==========================================
function castAbility(caster, index, dx, dy) {
    if (caster.cooldowns[index] > 0 || caster.stunTimer > 0 || caster.heldBy || caster.state === 'DEAD') return;
    caster.cooldowns[index] = caster.data.ab[index].cd;
    caster.anim(Math.random() > 0.5 ? 'punch-l' : 'punch-r');
    let type = caster.type; playSfx('magic');

    if (type === 'sans') {
        if (index===0) spawnProj(caster, dx*10, dy*10, '#fff', 15, 30);
        if (index===1) { caster.x += dx*150; caster.y += dy*150; createEffect(caster.x, caster.y, '#0ff', 60); }
        if (index===2) spawnBeam(caster, dx, dy, '#0ff', 60, 60);
    } else if (type === 'dustdust') {
        if (index===0) { spawnProj(caster, dx*8, dy*8, 'red', 20, 35); spawnProj(caster, (dx+0.2)*8, (dy-0.2)*8, 'red', 20, 35); }
        if (index===1) { let t = getTarget(caster, 200); if(t) t.stunTimer = 120; createEffect(caster.x, caster.y, 'purple', 80); }
        if (index===2) spawnBeam(caster, dx, dy, 'red', 80, 70);
    } else if (type === 'gojo') {
        if (index===0) { let t = getTarget(caster, 150); if(t){ t.vx = dx*15; t.vy = dy*15; t.state='THROWN'; t.damage(40, caster); } }
        if (index===1) { let t = getTarget(caster, 300); if(t){ t.x = caster.x+dx*30; t.y = caster.y+dy*30; t.damage(40, caster); } }
        if (index===2) spawnProj(caster, dx*4, dy*4, 'purple', 120, 100, true);
    } else if (type === 'sukuna') {
        if (index===0) { let t = getTarget(caster, 100); if(t){ t.damage(80, caster); t.stunTimer=40; createEffect(t.x, t.y, 'white', 80); } }
        if (index===1) { spawnProj(caster, dx*15, dy*15, 'rgba(255,255,255,0.8)', 40, 50); }
        if (index===2) { spawnProj(caster, dx*10, dy*10, 'orange', 50, 60, false, true); }
    } else if (type === 'saitama') {
        if (index===0) { let t = getTarget(caster, 80); if(t){ t.damage(100, caster); t.vx = dx*25; t.vy = dy*25; t.state='THROWN'; camShake = 10;} }
        if (index===1) { for(let i=0; i<5; i++) setTimeout(()=>spawnProj(caster, dx*(15+Math.random()*5), dy*(15+Math.random()*5), 'white', 15, 30), i*100); }
        if (index===2) { spawnBeam(caster, dx, dy, 'red', 250, 300); camShake = 20; }
    } else if (type === 'dustdustdust') {
        // УЛЬТИМАТИВНЫЙ БОСС
        if (index===0) { 
            for(let a=-2; a<=2; a++) { let ang = Math.atan2(dy, dx) + a*0.2; spawnProj(caster, Math.cos(ang)*15, Math.sin(ang)*15, 'darkred', 40, 100, true); } 
        }
        if (index===1) { 
            if(caster === player) { targetCamScale = 0.4; setTimeout(() => targetCamScale = 1.0, 1500); }
            camShake = 30; playSfx('explosion');
            createEffect(caster.x, caster.y, 'rgba(255,0,0,0.8)', 600); 
            entities.forEach(e => { if(e!==caster && e.z===caster.z && Math.hypot(e.x-caster.x, e.y-caster.y)<300) { e.damage(250, caster); e.vx = (e.x-caster.x)*0.1; e.vy = (e.y-caster.y)*0.1; e.state='THROWN';} }); 
        }
        if (index===2) { 
            if(caster === player) { targetCamScale = 0.5; setTimeout(() => targetCamScale = 1.0, 1000); }
            camShake = 40; playSfx('beam');
            spawnBeam(caster, dx, dy, 'linear-gradient(to bottom, transparent, red, darkred, black, darkred, red, transparent)', 500, 350, true); 
        }
    }
}

function getTarget(caster, range) {
    let closest = null, minDist = range;
    entities.forEach(e => {
        if(e!==caster && e.z === caster.z && e.state !== 'DEAD' && e.teamId !== caster.teamId) {
            let d = Math.hypot(e.x-caster.x, e.y-caster.y);
            if(d < minDist) { minDist = d; closest = e; }
        }
    }); return closest;
}

function spawnProj(owner, vx, vy, color, size, dmg, pierce=false, explode=false) {
    let el = document.createElement('div'); el.className = 'projectile';
    el.style.width = size+'px'; el.style.height = size+'px'; el.style.background = color;
    document.getElementById('entities').appendChild(el);
    projectiles.push({ x: owner.x, y: owner.y, z: owner.z, vx, vy, el, owner, pierce, explode, life: pierce?150:60, size, dmg });
}

function spawnBeam(owner, dx, dy, background, width, dmg, isCSSGradient=false) {
    let el = document.createElement('div'); el.className = 'beam';
    el.style.height = width+'px'; el.style.width = '2000px'; el.style.transformOrigin = 'left center';
    el.style.left = owner.x+'px'; el.style.top = owner.y+'px';
    if(isCSSGradient) el.style.background = background; else el.style.backgroundColor = background;
    el.style.color = isCSSGradient ? 'red' : background; // для свечения (box-shadow)
    
    let angle = Math.atan2(dy, dx) * 180 / Math.PI; el.style.transform = `translate(0, -50%) rotate(${angle}deg)`;
    document.getElementById('entities').appendChild(el);
    
    entities.forEach(e => {
        if (e !== owner && e.z === owner.z && e.state !== 'DEAD' && e.teamId !== owner.teamId) {
            let ex = e.x - owner.x, ey = e.y - owner.y;
            let dot = (ex*dx + ey*dy) / Math.hypot(ex, ey);
            if (dot > 0.95 && Math.hypot(ex, ey) < 2000) e.damage(dmg, owner);
        }
    });
    setTimeout(() => el.remove(), 400);
}

function createEffect(x, y, color, size) {
    let el = document.createElement('div'); el.className = 'effect'; el.style.width = size+'px'; el.style.height = size+'px'; 
    el.style.background = `radial-gradient(circle, ${color} 0%, transparent 70%)`; el.style.color = color;
    el.style.left = x+'px'; el.style.top = y+'px'; document.getElementById('entities').appendChild(el);
    setTimeout(() => el.remove(), 400);
}

function spawnText(x, y, text, color) {
    let el = document.createElement('div'); el.className = 'dmg-text'; el.innerText = text; el.style.color = color;
    el.style.left = x+'px'; el.style.top = y+'px'; document.getElementById('world').appendChild(el);
    setTimeout(() => el.remove(), 800);
}

function checkStairs(px, py) {
    let onStairs = buildings.some(b => px > b.stairsArea.x && px < b.stairsArea.x+b.stairsArea.w && py > b.stairsArea.y && py < b.stairsArea.y+b.stairsArea.h);
    let btn = document.getElementById('action-btn');
    if (onStairs && !player.holding) { btn.innerText = player.z === 0 ? 'Наверх' : 'Вниз'; btn.style.background = 'rgba(50, 200, 50, 0.9)'; } 
    else { btn.innerText = player.holding ? 'Кинуть' : 'Взять'; btn.style.background = 'rgba(255, 165, 0, 0.9)'; }
}

document.getElementById('action-btn').addEventListener('touchstart', (e) => {
    e.preventDefault(); e.stopPropagation();
    if (!player || player.stunTimer > 0 || player.state === 'DEAD') return;
    let btn = document.getElementById('action-btn');
    if (btn.innerText === 'Наверх') { player.z = 1; switchFloor(1); return; }
    if (btn.innerText === 'Вниз') { player.z = 0; switchFloor(0); return; }

    if (player.holding) { player.throwHeld(joystick.lastDirX, joystick.lastDirY); return; }

    let grabbable =[...furnitures.filter(f => !f.broken && f.z === player.z && !f.heldBy), ...entities.filter(e => e !== player && e.z === player.z && e.state === 'DEAD' && !e.heldBy)];
    let near = grabbable.find(g => Math.hypot(g.x - player.x, g.y - player.y) < 50);
    if (near) { player.holding = near; near.heldBy = player; if(near.type === 'furn') { near.broken = true; near.el.style.display = 'block'; } player.el.classList.add('grab-pose'); }
});

function switchFloor(z) {
    buildings.forEach(b => {
        let inside = player.x > b.x && player.x < b.x+b.w && player.y > b.y && player.y < b.y+b.h;
        if (z===1 && inside) { b.roofEl.style.opacity = '0'; b.el.classList.add('floor2-active'); }
        else { b.roofEl.style.opacity = '1'; b.el.classList.remove('floor2-active'); }
    });
    furnitures.forEach(f => { if(!f.heldBy && !f.broken) f.el.style.display = (f.z === z) ? 'block' : 'none'; });
}

const chatMenu = document.getElementById('chat-menu');
document.getElementById('chat-btn').addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation();
    if(!player || player.state === 'DEAD') return;
    chatMenu.style.display = chatMenu.style.display === 'grid' ? 'none' : 'grid';
});

    if(chatMenu.style.display === 'grid' && !e.target.closest('#chat-menu') && !e.target.closest('#chat-btn')) {
        chatMenu.style.display = 'none';
    }
});

function sendChat(msg, type) {
    if(!player || player.state === 'DEAD') return;
    player.showEmotion(msg); chatMenu.style.display = 'none';
    
    entities.forEach(bot => {
        if (bot.isBot && bot.state !== 'DEAD' && bot.z === player.z && Math.hypot(bot.x - player.x, bot.y - player.y) < 300) {
            if (type === 'pvp-friend') { bot.personality = 'PVP_FRIENDLY'; bot.target = player; bot.showEmotion('👍'); } 
            else if (type === 'pvp-death') { bot.personality = 'AGGRESSIVE'; bot.target = player; bot.showEmotion('☠️'); }
            else if (type === 'team') { if(bot.personality !== 'AGGRESSIVE') { bot.teamId = -1; bot.showEmotion('🤝'); bot.socialTarget = player; bot.personality = 'SOCIAL';} }
            else if (type === 'help') { if(bot.teamId === -1 || bot.personality === 'SOCIAL') { bot.target = entities.find(e => e.target === player); bot.showEmotion('🛡️');} }
            else if (type === 'angry') { bot.teamId = 0; bot.target = null; bot.showEmotion('💢'); bot.move((bot.x-player.x), (bot.y-player.y)); }
            else { bot.showEmotion('👋'); }
        }
    });
}

const joyArea = document.getElementById('joystick-area');
const joyKnob = document.getElementById('joystick-knob');
let joyCenter = {x: 0, y: 0}, joyTouchId = null;

joyArea.addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation();
    let touch = e.changedTouches[0]; joyTouchId = touch.identifier;
    joyCenter = { x: joyArea.getBoundingClientRect().left + 60, y: joyArea.getBoundingClientRect().top + 60 };
    joystick.active = true; updateJoy(touch);
});

document.addEventListener('touchmove', e => { 
    if (joystick.active) {
        for(let i=0; i<e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === joyTouchId) { e.preventDefault(); updateJoy(e.changedTouches[i]); }
        }
    }
}, { passive: false });

document.addEventListener('touchend', e => { 
    if (joystick.active) {
        for(let i=0; i<e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === joyTouchId) {
                joystick.active = false; joystick.dx = 0; joystick.dy = 0; joyKnob.style.transform = `translate(0px, 0px)`; joyTouchId = null;
            }
        }
    }
});

function updateJoy(touch) {
    let dx = touch.clientX - joyCenter.x, dy = touch.clientY - joyCenter.y;
    let dist = Math.hypot(dx, dy);
    if (dist > 40) { dx = (dx/dist)*40; dy = (dy/dist)*40; }
    joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
    joystick.dx = dx / 40; joystick.dy = dy / 40;
    if (dist > 10) { joystick.dirX = dx/dist; joystick.dirY = dy/dist; joystick.lastDirX = joystick.dirX; joystick.lastDirY = joystick.dirY; }
}

[1,2,3].forEach(i => {
    document.getElementById('ab'+i).addEventListener('touchstart', e => {
        e.preventDefault(); e.stopPropagation();
        if(player) castAbility(player, i-1, joystick.lastDirX, joystick.lastDirY);
    });
});

// ==========================================
// GAME LOOP (Camera & Logic)
// ==========================================
function startGame(key) {
    document.getElementById('menu').style.display = 'none'; document.getElementById('game-container').style.display = 'block';
    document.getElementById('ui').style.display = 'block'; document.getElementById('hud-coins').style.display = 'block';
    generateWorld();
    player = new Entity(worldSize/2, worldSize/2 + 200, key, false); entities.push(player);
    for(let i=0; i<8; i++) spawnBot();
    gameActive = true; requestAnimationFrame(loop);
}

function loop() {
    if (!gameActive) return; 
    
    // Плавная камера и тряска
    camScale += (targetCamScale - camScale) * 0.1;
    let sx = 0, sy = 0;
    if (camShake > 0.5) {
        sx = (Math.random() - 0.5) * camShake; sy = (Math.random() - 0.5) * camShake;
        camShake *= 0.85; // затухание тряски
    }

    if (player && player.state !== 'DEAD' && !player.heldBy) {
        if (joystick.active) { let len = Math.hypot(joystick.dx, joystick.dy); if (len > 0) player.move(joystick.dx/len, joystick.dy/len); }
        if (player.z === 0) {
            buildings.forEach(b => {
                let inside = player.x > b.x && player.x < b.x+b.w && player.y > b.y && player.y < b.y+b.h;
                b.roofEl.style.opacity = inside ? '0.2' : '1';
            });
        }
        for(let i=1; i<=3; i++) {
            let btn = document.getElementById('ab'+i);
            if(player.cooldowns[i-1] > 0) { btn.classList.add('cooldown'); btn.innerText = Math.ceil(player.cooldowns[i-1]/60); }
            else { btn.classList.remove('cooldown'); btn.innerText = i; }
        }
    }

    entities.forEach(e => {
        for(let i=0; i<3; i++) if (e.cooldowns[i] > 0) e.cooldowns[i]--;
        if (e.stunTimer > 0) e.stunTimer--;
        
        if (e.state === 'THROWN') {
            e.x += e.vx; e.y += e.vy; e.vx *= 0.95; e.vy *= 0.95;
            if (Math.hypot(e.vx, e.vy) < 1) { if(e.hp > 0) e.state = 'NORMAL'; }
            
            entities.forEach(other => {
                if (other !== e && other.z === e.z && other.state !== 'DEAD' && Math.hypot(other.x - e.x, other.y - e.y) < 40) {
                    other.damage(40, null); e.damage(10, null); e.vx = 0; e.vy = 0; 
                    if(e.hp > 0) e.state = 'NORMAL'; createEffect(e.x, e.y, 'white', 50);
                }
            });

            if (e.z === 1) {
                let insideAny = buildings.some(b => e.x > b.x && e.x < b.x+b.w && e.y > b.y && e.y < b.y+b.h);
                if (!insideAny) {
                    e.z = 0; e.damage(50, null);
                    createEffect(e.x, e.y, 'cyan', 80); playSfx('glass'); spawnText(e.x, e.y, "Упал!", 'white');
                }
            }
        }
        e.updateAI(); e.updatePos();
    });

    furnitures.forEach(f => {
        if (f.state === 'THROWN') {
            f.x += f.vx; f.y += f.vy; f.vx *= 0.95; f.vy *= 0.95;
            f.el.style.transform = `translate(calc(${f.x}px - 50%), calc(${f.y}px - 50%))`;
            if (Math.hypot(f.vx, f.vy) < 1) { f.state = 'NORMAL'; f.el.classList.add('broken'); f.respawn = 300; f.el.style.display = 'none'; }
            
            entities.forEach(e => {
                if (e.z === f.z && e.state !== 'DEAD' && Math.hypot(e.x - f.x, e.y - f.y) < 30) {
                    e.damage(30, null); f.vx = 0; f.vy = 0; f.state = 'NORMAL'; f.el.classList.add('broken'); f.respawn = 300; f.el.style.display = 'none';
                    createEffect(f.x, f.y, 'brown', 50); playSfx('punch');
                }
            });
            
            if (f.z === 1) {
                let insideAny = buildings.some(b => f.x > b.x && f.x < b.x+b.w && f.y > b.y && f.y < b.y+b.h);
                if (!insideAny) { f.z = 0; f.vx=0; f.vy=0; f.state='NORMAL'; f.el.classList.add('broken'); f.respawn=300; f.el.style.display='none'; createEffect(f.x, f.y, 'cyan', 80); playSfx('glass'); }
            }
        } else if (f.broken && !f.heldBy) {
            f.respawn--; if (f.respawn <= 0) { f.broken = false; f.el.classList.remove('broken'); if(f.z === player.z) f.el.style.display = 'block'; }
        } else if (f.heldBy) {
            f.x = f.heldBy.x; f.y = f.heldBy.y - 30; f.z = f.heldBy.z;
            f.el.style.transform = `translate(calc(${f.x}px - 50%), calc(${f.y}px - 50%))`;
        }
    });

    for(let i=projectiles.length-1; i>=0; i--) {
        let p = projectiles[i];
        p.x += p.vx; p.y += p.vy; p.life--; p.el.style.transform = `translate(calc(${p.x}px - 50%), calc(${p.y}px - 50%))`;
        let hit = false;
        entities.forEach(e => {
            if (e !== p.owner && e.z === p.z && e.state !== 'DEAD' && e.teamId !== p.owner.teamId && Math.hypot(e.x - p.x, e.y - p.y) < (p.size/2 + 20)) {
                e.damage(p.dmg, p.owner); hit = true;
                if(p.explode) { createEffect(p.x, p.y, 'orange', 150); playSfx('explosion'); camShake = 15; entities.forEach(e2=>{if(e2.state !== 'DEAD' && Math.hypot(e2.x-p.x,e2.y-p.y)<100) e2.damage(60, p.owner);}); }
            }
        });
        if (p.life <= 0 || (hit && !p.pierce)) { p.el.remove(); projectiles.splice(i, 1); }
    }

    if (player) {
        let sw = window.innerWidth, sh = window.innerHeight;
        // Применяем масштабирование и тряску камеры от центра экрана
        document.getElementById('world').style.transform = `translate(${sw/2 + sx}px, ${sh/2 + sy}px) scale(${camScale}) translate(${-player.x}px, ${-player.y}px)`;
    }

    requestAnimationFrame(loop);
}
</script>
