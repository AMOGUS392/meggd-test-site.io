<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>игра</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #2c3e50; font-family: sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }
        
        #mobile-controls { position: absolute; bottom: 0; width: 100%; height: 100%; pointer-events: none; }
        #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; }
        #joystick-knob { width: 50px; height: 50px; background: rgba(255, 255, 255, 0.5); border-radius: 50%; position: absolute; }
        .btn { position: absolute; background: rgba(46, 204, 113, 0.7); color: white; border: 2px solid white; border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer; }
        .btn:active { transform: scale(0.95); }
        #btn-attack { bottom: 30px; right: 30px; width: 70px; height: 70px; font-size: 12px; background: rgba(231, 76, 60, 0.7); }
        #btn-recruit { bottom: 110px; right: 80px; width: 60px; height: 60px; font-size: 10px; background: rgba(52, 152, 219, 0.7); }
        #pc-hint { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; pointer-events: none; }
        
        @media (min-width: 1024px) { #mobile-controls { display: none; } }
        @media (max-width: 1023px) { #pc-hint { display: none; } }

        #ac-btn { top: 20px; right: 20px; bottom: auto; left: auto; width: 50px; height: 50px; font-size: 12px; background: rgba(39, 174, 96, 0.9); z-index: 100; box-shadow: 0 0 10px #2ecc71; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 5px #2ecc71; } 50% { box-shadow: 0 0 20px #2ecc71; } 100% { box-shadow: 0 0 5px #2ecc71; } }
        
        #ac-menu { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(25, 35, 45, 0.95); border: 2px solid #2ecc71; border-radius: 12px; width: 85%; max-width: 400px; padding: 20px; color: white; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); pointer-events: auto; backdrop-filter: blur(5px); }
        .head { font-size: 18px; font-weight: bold; color: #2ecc71; text-align: center; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; margin-bottom: 15px; letter-spacing: 1px; }
        .stat { margin: 12px 0; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
        .stat span { font-weight: bold; font-family: monospace; font-size: 16px; float: right; }
        
        #ac-logs { background: #0a0f14; padding: 10px; border-radius: 6px; height: 140px; overflow-y: auto; font-family: monospace; font-size: 11px; color: #aaa; margin-top: 15px; border: 1px solid #444; word-wrap: break-word; line-height: 1.4; }
        #ac-logs span.t { color: #3498db; }
        #ac-logs span.e { color: #e74c3c; font-weight: bold; }
        
        #ac-close { margin-top: 15px; width: 100%; padding: 12px; background: #e74c3c; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #ac-close:active { background: #c0392b; transform: scale(0.98); }
    </style>

<script id="s1">
const anti_code = (function() {
    const token = Math.random().toString(36).substring(2) + Date.now().toString(36);
    let is_auth = false;
    let blocks = 0;
    let logs =[];

    const orig_txt = Object.getOwnPropertyDescriptor(Node.prototype, 'textContent');
    const orig_htm = Object.getOwnPropertyDescriptor(Element.prototype, 'innerHTML');
    const orig_app = Node.prototype.appendChild;
    const orig_ins = Node.prototype.insertBefore;

    function add_log(reason) {
        blocks++;
        const time_str = new Date().toLocaleTimeString('ru-RU');
        logs.push(`<span class="t">[${time_str}]</span> <span class="e">[блок]</span> ${reason}`);
        if (logs.length > 50) logs.shift();
    }

    function trap(code, reason) {
        add_log(reason);
        console.warn(`блок: ${reason}`);
    }

    function is_bad(node) {
        if (!node) return false;
        if (node.nodeName === 'SCRIPT') return true;
        if (node.querySelectorAll && node.querySelectorAll('script').length > 0) return true;
        return false;
    }

    Object.defineProperty(Node.prototype, 'textContent', {
        set: function(val) {
            if (!is_auth && (this.id === 's3' || this.id === 's2' || this.id === 's1')) {
                trap(val, `изменение скрипта`);
                return; 
            }
            orig_txt.set.call(this, val);
        },
        get: orig_txt.get
    });

    Object.defineProperty(Element.prototype, 'innerHTML', {
        set: function(val) {
            if (!is_auth && (this === document.body || this === document.documentElement || this.id === 'game')) {
                trap(val, `перезапись ядра`);
                return; 
            }
            orig_htm.set.call(this, val);
        },
        get: orig_htm.get
    });

    Node.prototype.appendChild = function(node) {
        if (!is_auth && is_bad(node)) {
            trap(node.src || node.textContent, "внедрение скрипта");
            return node; 
        }
        return orig_app.call(this, node);
    };

    Node.prototype.insertBefore = function(node, ref) {
        if (!is_auth && is_bad(node)) {
            trap(node.src || node.textContent, "внедрение скрипта");
            return node; 
        }
        return orig_ins.call(this, node, ref);
    };

    return {
        auth: function(t, act) {
            if (t === token) {
                is_auth = true;
                try { act(); } finally { is_auth = false; }
            } else {
                trap("fail", "неверный токен");
            }
        },
        get_token: function() {
            const t = token; delete this.get_token; return t;
        },
        stats: function() {
            return { b: blocks, l: logs };
        }
    };
})();
</script>

<script id="s2">
const sys = (function() {
    let orig = null;
    let last = Date.now();
    let crashed = false;
    const sys_tok = typeof anti_code !== 'undefined' ? anti_code.get_token() : null;

    function crash(reason) {
        if (crashed) return; crashed = true;
        if (reason === "detected") alert("detected");
        const draw = () => {
            document.body.innerHTML = `<div style="display:flex; height:100vh; width:100vw; background:#0a0a0a; color:#ff3333; justify-content:center; align-items:center; flex-direction:column; font-family:sans-serif; text-align:center;"><h2>${reason}</h2></div>`;
        };
        if (typeof anti_code !== 'undefined' && sys_tok) anti_code.auth(sys_tok, draw);
        else draw();
        setTimeout(() => { window.location.replace("about:blank"); }, 2500);
    }

    return Object.freeze({
        init: function(code) {
            orig = code; last = Date.now();
            setInterval(() => {
                if (crashed) return;
                if (Date.now() - last > 25000) crash("нет ответа");
            }, 1000);
        },
        verify: function(code) {
            if (crashed) return; last = Date.now();
            if (code !== orig) crash("detected");
        }
    });
})();
</script>
</head>
<body>

    <div id="game">
        <div id="ac-btn" class="btn">меню</div>
        
        <div id="ac-menu">
            <div class="head">система</div>
            <div class="stat">статус: <span style="color:#2ecc71;">ок</span></div>
            <div class="stat">таймер: <span id="ac-time" style="color:#f1c40f;">10.0s</span></div>
            <div class="stat">блоки: <span id="ac-blocks" style="color:#e74c3c;">0</span></div>
            <div id="ac-logs"><span class="t">[sys]</span> старт<br></div>
            <button id="ac-close">закрыть</button>
        </div>

        <canvas id="canvas"></canvas>
        <div id="pc-hint">wasd - бег<br>пробел - атака<br>e - вербовка</div>
        <div id="mobile-controls">
            <div id="joystick-zone"><div id="joystick-knob"></div></div>
            <div id="btn-attack" class="btn">атака</div>
            <div id="btn-recruit" class="btn">команда</div>
        </div>
    </div>

<script id="s3">
function get_code() {
    const el = document.getElementById('s3');
    if (!el) throw new Error("del");
    return el.textContent;
}

sys.init(get_code());
let next_time = Date.now() + 10000;

setInterval(() => {
    try {
        if (typeof sys === 'undefined' || !sys.verify) throw new Error("del");
        sys.verify(get_code());
        next_time = Date.now() + 10000;
    } catch (e) {
        if (typeof anti_code !== 'undefined') anti_code.auth(null, () => { document.body.innerHTML = "fatal"; });
        document.body.innerHTML = `<div style="display:flex; height:100vh; width:100vw; background:#000; color:#ff3333; justify-content:center; align-items:center;"><h2>повреждено</h2></div>`;
        setTimeout(() => { window.location.replace("about:blank"); }, 2500);
    }
}, 10000);

const btn_on = document.getElementById('ac-btn');
const menu = document.getElementById('ac-menu');
const btn_off = document.getElementById('ac-close');
const el_time = document.getElementById('ac-time');
const el_blocks = document.getElementById('ac-blocks');
const el_logs = document.getElementById('ac-logs');

function toggle(state) {
    menu.style.display = state ? 'block' : 'none';
}

btn_on.addEventListener('mousedown', (e) => { e.preventDefault(); toggle(true); });
btn_on.addEventListener('touchstart', (e) => { e.preventDefault(); toggle(true); });
btn_off.addEventListener('mousedown', (e) => { e.preventDefault(); toggle(false); });
btn_off.addEventListener('touchstart', (e) => { e.preventDefault(); toggle(false); });

setInterval(() => {
    if (menu.style.display === 'none') return;
    let left = Math.max(0, (next_time - Date.now()) / 1000).toFixed(1);
    el_time.innerText = left + 's';
    
    if (typeof anti_code !== 'undefined') {
        let st = anti_code.stats();
        el_blocks.innerText = st.b;
        let html = '<span class="t">[sys]</span> активно<br>';
        if (st.l.length === 0) html += '<span class="t">[sys]</span> ожидание...<br>';
        else st.l.forEach(log => { html += log + '<br>'; });
        if (el_logs.innerHTML !== html) {
            el_logs.innerHTML = html;
            el_logs.scrollTop = el_logs.scrollHeight;
        }
    }
}, 100);

const canvas = document.getElementById('canvas');
if(canvas) {
    const ctx = canvas.getContext('2d');
    let w, h;

    function resize() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
    window.addEventListener('resize', resize); resize();

    const inp = { x: 0, y: 0, att: false, rec: false };
    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    const j_zone = document.getElementById('joystick-zone');
    const j_knob = document.getElementById('joystick-knob');
    let j_on = false, j_cen = { x: 0, y: 0 };

    if(j_zone) {
        j_zone.addEventListener('touchstart', e => {
            e.preventDefault(); j_on = true;
            let rect = j_zone.getBoundingClientRect();
            j_cen = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            upd_j(e.changedTouches[0]);
        }, {passive: false});
        j_zone.addEventListener('touchmove', e => { if (j_on) { e.preventDefault(); upd_j(e.changedTouches[0]); } }, {passive: false});
        j_zone.addEventListener('touchend', e => { e.preventDefault(); j_on = false; j_knob.style.transform = `translate(0px, 0px)`; inp.x = 0; inp.y = 0; });
    }

    function upd_j(t) {
        let dx = t.clientX - j_cen.x, dy = t.clientY - j_cen.y;
        let dist = Math.sqrt(dx*dx + dy*dy), max = 35;
        if (dist > max) { dx = (dx / dist) * max; dy = (dy / dist) * max; }
        j_knob.style.transform = `translate(${dx}px, ${dy}px)`;
        inp.x = dx / max; inp.y = dy / max;
    }

    const b_att = document.getElementById('btn-attack');
    const b_rec = document.getElementById('btn-recruit');
    if(b_att) {
        b_att.addEventListener('touchstart', (e) => { e.preventDefault(); inp.att = true; });
        b_att.addEventListener('touchend', (e) => { e.preventDefault(); inp.att = false; });
        b_rec.addEventListener('touchstart', (e) => { e.preventDefault(); inp.rec = true; });
        b_rec.addEventListener('touchend', (e) => { e.preventDefault(); inp.rec = false; });
    }

    const cam = { x: 0, y: 0 };
    const nuts = [];
    const bots =[];
    const words = {
        n: ["где я?", "иду", "команда?"],
        a:["босс!", "каштан!", "да!"],
        e:["цель!", "отдай!", "враг!"]
    };

    class nut {
        constructor(x, y, vx, vy, t) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy;
            this.t = t; this.hp = 100; this.r = 8;
        }
        upd() { this.x += this.vx; this.y += this.vy; this.hp--; }
        draw(c) {
            c.fillStyle = '#8b4513';
            c.beginPath(); c.arc(this.x, this.y, this.r, 0, Math.PI * 2); c.fill();
            c.fillStyle = '#d2b48c';
            c.beginPath(); c.arc(this.x - 2, this.y - 2, 3, 0, Math.PI * 2); c.fill();
        }
    }

    class bot {
        constructor(x, y, p = false) {
            this.x = x; this.y = y; this.p = p;
            this.r = 20; this.s = p ? 4 : 2;
            this.t = p ? 1 : 0;
            if (!p && Math.random() < 0.3) this.t = 2;
            this.hp = 100; this.cd = 0;
            this.txt = ""; this.txt_t = 0;
        }
        say(text) { this.txt = text; this.txt_t = 150; }
        upd() {
            if (this.p) {
                let dx = 0, dy = 0;
                if (keys['KeyW']) dy -= 1; if (keys['KeyS']) dy += 1;
                if (keys['KeyA']) dx -= 1; if (keys['KeyD']) dx += 1;
                if (inp.x !== 0 || inp.y !== 0) { dx = inp.x; dy = inp.y; }
                let len = Math.sqrt(dx*dx + dy*dy);
                if (len > 0) { this.x += (dx/len) * this.s; this.y += (dy/len) * this.s; }

                if ((keys['Space'] || inp.att) && this.cd <= 0) {
                    this.fire(dx || 1, dy || 0);
                    this.cd = 20; this.say("лови!"); inp.att = false;
                }
                if (keys['KeyE'] || inp.rec) {
                    this.rec(); keys['KeyE'] = false; inp.rec = false;
                }
            } else {
                if (this.t === 0) {
                    if (Math.random() < 0.02) { this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2; }
                    this.x += this.vx || 0; this.y += this.vy || 0;
                    if (Math.random() < 0.005) this.say(words.n[Math.floor(Math.random() * words.n.length)]);
                } else if (this.t === 1) {
                    let pl = bots[0];
                    let dist = Math.hypot(pl.x - this.x, pl.y - this.y);
                    if (dist > 80) { this.x += (pl.x - this.x) / dist * this.s * 0.9; this.y += (pl.y - this.y) / dist * this.s * 0.9; }
                    let en = this.find(2);
                    if (en && Math.hypot(en.x - this.x, en.y - this.y) < 300 && this.cd <= 0) {
                        this.fire(en.x - this.x, en.y - this.y); this.cd = 40;
                    }
                    if (Math.random() < 0.005) this.say(words.a[Math.floor(Math.random() * words.a.length)]);
                } else if (this.t === 2) {
                    let tg = this.find(1);
                    if (tg) {
                        let dist = Math.hypot(tg.x - this.x, tg.y - this.y);
                        if (dist > 150) { this.x += (tg.x - this.x) / dist * this.s * 0.8; this.y += (tg.y - this.y) / dist * this.s * 0.8; } 
                        else if (this.cd <= 0) { this.fire(tg.x - this.x, tg.y - this.y); this.cd = 50; }
                    }
                    if (Math.random() < 0.005) this.say(words.e[Math.floor(Math.random() * words.e.length)]);
                }
            }
            if (this.cd > 0) this.cd--;
            if (this.txt_t > 0) this.txt_t--;
            this.x = Math.max(-2000, Math.min(2000, this.x));
            this.y = Math.max(-2000, Math.min(2000, this.y));
        }
        fire(dx, dy) {
            let len = Math.sqrt(dx*dx + dy*dy);
            nuts.push(new nut(this.x, this.y, (dx/len)*10, (dy/len)*10, this.t));
        }
        rec() {
            for (let i = 1; i < bots.length; i++) {
                let b = bots[i];
                if (b.t === 0 && Math.hypot(b.x - this.x, b.y - this.y) < 150) {
                    b.t = 1; b.say("с тобой!");
                    b.r += 5; setTimeout(()=> b.r -=5, 200);
                }
            }
        }
        find(t) {
            let near = null, min = Infinity;
            for (let b of bots) {
                if (b.t === t && b.hp > 0) {
                    let d = Math.hypot(b.x - this.x, b.y - this.y);
                    if (d < min) { min = d; near = b; }
                }
            }
            return near;
        }
        draw(c) {
            c.save(); c.translate(this.x, this.y);
            if (this.p) c.fillStyle = '#3498db'; else if (this.t === 1) c.fillStyle = '#2ecc71';
            else if (this.t === 2) c.fillStyle = '#e74c3c'; else c.fillStyle = '#95a5a6';
            c.beginPath(); c.roundRect(-15, -15, 30, 30, 5); c.fill();
            c.strokeStyle = '#2c3e50'; c.lineWidth = 2; c.stroke();
            c.fillStyle = '#ecf0f1'; c.fillRect(-10, -10, 20, 10);
            c.fillStyle = this.t === 2 ? '#c0392b' : '#34495e'; c.fillRect(-2, -8, 4, 6);
            if (this.hp < 100) { c.fillStyle = 'red'; c.fillRect(-15, -25, 30, 4); c.fillStyle = 'lightgreen'; c.fillRect(-15, -25, 30 * (this.hp/100), 4); }
            c.restore();
            if (this.txt_t > 0) {
                c.font = "bold 14px sans-serif"; let tw = c.measureText(this.txt).width;
                c.fillStyle = 'rgba(255, 255, 255, 0.9)'; c.beginPath();
                c.roundRect(this.x - tw/2 - 10, this.y - 50, tw + 20, 25, 5); c.fill();
                c.strokeStyle = '#333'; c.stroke(); c.fillStyle = '#000';
                c.textAlign = 'center'; c.fillText(this.txt, this.x, this.y - 33);
            }
        }
    }

    const pl = new bot(0, 0, true); bots.push(pl);
    for (let i = 0; i < 40; i++) bots.push(new bot((Math.random() - 0.5) * 3000, (Math.random() - 0.5) * 3000));

    function tick() {
        if (!document.getElementById('canvas')) return;

        ctx.fillStyle = '#8fbf73'; ctx.fillRect(0, 0, w, h);
        cam.x = pl.x - w / 2; cam.y = pl.y - h / 2;

        ctx.save(); ctx.translate(-cam.x, -cam.y);

        ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
        let sx = Math.floor(cam.x / 100) * 100, sy = Math.floor(cam.y / 100) * 100;
        for (let i = sx; i < sx + w + 100; i += 100) { ctx.beginPath(); ctx.moveTo(i, cam.y); ctx.lineTo(i, cam.y + h); ctx.stroke(); }
        for (let i = sy; i < sy + h + 100; i += 100) { ctx.beginPath(); ctx.moveTo(cam.x, i); ctx.lineTo(cam.x + w, i); ctx.stroke(); }

        for (let i = nuts.length - 1; i >= 0; i--) {
            let c = nuts[i]; c.upd(); c.draw(ctx);
            for (let b of bots) {
                if (b.t !== c.t && b.t !== 0 && c.t !== 0) {
                    if (Math.hypot(b.x - c.x, b.y - c.y) < b.r + c.r) {
                        b.hp -= 25; b.say("ай!"); c.hp = 0; break;
                    }
                }
            }
            if (c.hp <= 0) nuts.splice(i, 1);
        }

        for (let i = bots.length - 1; i >= 0; i--) {
            let b = bots[i]; b.upd(); b.draw(ctx);
            if (b.hp <= 0) {
                bots.splice(i, 1);
                if (!b.p) bots.push(new bot(pl.x + (Math.random()-0.5)*1000, pl.y + (Math.random()-0.5)*1000));
            }
        }

        ctx.beginPath(); ctx.arc(pl.x, pl.y, 150, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(52, 152, 219, 0.2)'; ctx.lineWidth = 2; ctx.stroke();
        ctx.restore();

        requestAnimationFrame(tick);
    }
    tick();
}
</script>
</body>
</html>
