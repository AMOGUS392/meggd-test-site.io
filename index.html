<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Каштановые Боты (Защищено Anti-code & SIS)</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; user-select: none;
        }
        canvas { display: block; }
        #mobile-controls { position: absolute; bottom: 0; width: 100%; height: 100%; pointer-events: none; }
        #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; }
        #joystick-knob { width: 50px; height: 50px; background: rgba(255, 255, 255, 0.5); border-radius: 50%; position: absolute; }
        .action-btn { position: absolute; background: rgba(46, 204, 113, 0.7); color: white; border: 2px solid white; border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .action-btn:active { background: rgba(39, 174, 96, 0.9); transform: scale(0.95); }
        #btn-attack { bottom: 30px; right: 30px; width: 70px; height: 70px; font-size: 12px; background: rgba(231, 76, 60, 0.7); }
        #btn-recruit { bottom: 110px; right: 80px; width: 60px; height: 60px; font-size: 10px; background: rgba(52, 152, 219, 0.7); }
        #pc-hint { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; pointer-events: none; }
        @media (min-width: 1024px) { #mobile-controls { display: none; } }
        @media (max-width: 1023px) { #pc-hint { display: none; } }
    </style>

<!-- ========================================== -->
<!-- 1. ANTI-CODE SYSTEM (ПЕРВАЯ ЛИНИЯ ОБОРОНЫ) -->
<!-- ========================================== -->
<script id="anti-code-script">
const AntiCode = (function() {
    // Генерация одноразового маршрутного токена для легальных изменений (SIS)
    const SECRET_ROUTE_TOKEN = Math.random().toString(36).substring(2) + Date.now().toString(36);
    let isAuthorized = false;

    // Сохраняем оригинальные методы браузера до их переопределения
    const originalTextContentDescriptor = Object.getOwnPropertyDescriptor(Node.prototype, 'textContent');
    const originalInnerHTMLDescriptor = Object.getOwnPropertyDescriptor(Element.prototype, 'innerHTML');

    // Ловушка: блокирует изменение, выводит инфу и крашит атакующий скрипт
    function executeTrap(maliciousCode, reason) {
        console.warn(`%cAnti-code[
  STATUS: BLOCKED
  ACTION: Redirected to infinite recursion trap (Stack Overflow Error)
  REASON: ${reason}
  PAYLOAD PREVIEW: ${String(maliciousCode).substring(0, 150)}...
]`, 'color: #ff3333; font-weight: bold; font-size: 13px; background: #222; padding: 10px; border-radius: 5px;');
        
        // Перенаправление кода самого на себя в бесконечный цикл (приводит к ошибке)
        function infiniteLoop() {
            try { 
                // Выполняет код, который хотел изменить сайт
                new Function(maliciousCode)(); 
            } catch(e) {}
            infiniteLoop(); // Бесконечная рекурсия -> Error: Maximum call stack size exceeded
        }
        infiniteLoop();
    }

    // Перехват модификации текста (защита тегов скриптов)
    Object.defineProperty(Node.prototype, 'textContent', {
        set: function(value) {
            if (!isAuthorized && (this.id === 'game-script' || this.id === 'sis-script' || this.id === 'anti-code-script')) {
                executeTrap(value, `Attempted to modify protected script: ${this.id}`);
                return;
            }
            originalTextContentDescriptor.set.call(this, value);
        },
        get: originalTextContentDescriptor.get
    });

    // Перехват перезаписи структуры сайта (защита DOM)
    Object.defineProperty(Element.prototype, 'innerHTML', {
        set: function(value) {
            if (!isAuthorized && (this === document.body || this === document.documentElement || this.id === 'game-container')) {
                executeTrap(value, `Attempted to overwrite site structural DOM: ${this.tagName}`);
                return;
            }
            originalInnerHTMLDescriptor.set.call(this, value);
        },
        get: originalInnerHTMLDescriptor.get
    });

    // Перехват добавления новых сторонних скриптов в DOM
    const observer = new MutationObserver(mutations => {
        if (isAuthorized) return;
        for (let mutation of mutations) {
            for (let node of mutation.addedNodes) {
                if (node.tagName === 'SCRIPT') {
                    let code = node.textContent || node.src || "Unknown inline script";
                    executeTrap(code, "Unauthorized script injection detected.");
                    node.remove();
                }
            }
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        observer.observe(document.documentElement, { childList: true, subtree: true });
    });

    return {
        // Сайт требует разрешения (токен) для изменения своего маршрута
        authorizeChange: function(token, action) {
            if (token === SECRET_ROUTE_TOKEN) {
                isAuthorized = true;
                try { action(); } finally { isAuthorized = false; }
            } else {
                executeTrap(action.toString(), "Invalid Anti-Code permission token.");
            }
        },
        _issueTokenForSIS: function() {
            const token = SECRET_ROUTE_TOKEN;
            delete this._issueTokenForSIS; // Выдаем токен 1 раз и удаляем функцию
            return token;
        }
    };
})();
</script>

<!-- ========================================== -->
<!-- 2. SENTINEL INTEGRITY SYSTEM (SIS)         -->
<!-- ========================================== -->
<script id="sis-script">
const SentinelIntegritySystem = (function() {
    let originalSource = null;
    let lastReportTime = Date.now();
    let isCrashed = false;
    
    // Получаем токен легального доступа от Anti-Code
    const SIS_TOKEN = typeof AntiCode !== 'undefined' ? AntiCode._issueTokenForSIS() : null;

    function executeCrash(reason) {
        if (isCrashed) return;
        isCrashed = true;
        
        if (reason === "Detected Tamping") alert("Detected Tamping");
        
        const renderCrashScreen = () => {
            document.body.innerHTML = `
                <div style="display:flex; height:100vh; width:100vw; background:#0a0a0a; color:#ff3333; justify-content:center; align-items:center; flex-direction:column; font-family:monospace; text-align:center;">
                    <h1 style="font-size: 40px; margin-bottom: 10px; border-bottom: 2px solid red;">[ SIS SECURITY BREACH ]</h1>
                    <h2 style="font-size: 24px;">CRASH INITIATED</h2>
                    <p style="font-size: 20px; color: #ff9999;">${reason}</p>
                </div>
            `;
        };

        // SIS меняет интерфейс легально, получая маршрут у Anti-Code
        if (typeof AntiCode !== 'undefined' && SIS_TOKEN) {
            AntiCode.authorizeChange(SIS_TOKEN, renderCrashScreen);
        } else {
            renderCrashScreen(); // Fallback, если AntiCode удален хакером
        }
        
        setTimeout(() => { window.location.replace("about:blank"); }, 2500);
    }

    const system = {
        init: function(code) {
            originalSource = code;
            lastReportTime = Date.now();
            setInterval(() => {
                if (isCrashed) return;
                if (Date.now() - lastReportTime > 25000) {
                    executeCrash("The server was unresponsive for 25 seconds.");
                }
            }, 1000);
        },
        verify: function(clientCode) {
            if (isCrashed) return;
            lastReportTime = Date.now();
            if (clientCode !== originalSource) {
                executeCrash("Detected Tamping");
            }
        }
    };
    return Object.freeze(system);
})();
</script>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="pc-hint">
            <b>Управление (ПК):</b><br>WASD - Движение<br>Пробел - Бросок<br>E - Вербовка
        </div>
        <div id="mobile-controls">
            <div id="joystick-zone"><div id="joystick-knob"></div></div>
            <div id="btn-attack" class="action-btn">КАШТАН!</div>
            <div id="btn-recruit" class="action-btn">В КОМАНДУ</div>
        </div>
    </div>

<!-- ========================================== -->
<!-- 3. ИГРОВОЙ ДВИЖОК                          -->
<!-- ========================================== -->
<script id="game-script">
function getGameSourceCode() {
    const scriptElem = document.getElementById('game-script');
    if (!scriptElem) throw new Error("Script element removed");
    return scriptElem.textContent;
}

// Запуск SIS
SentinelIntegritySystem.init(getGameSourceCode());

// Отправка отчетов каждые 10 секунд (пульс)
setInterval(() => {
    try {
        if (typeof SentinelIntegritySystem === 'undefined' || !SentinelIntegritySystem.verify) {
            throw new Error("SIS Not Found");
        }
        SentinelIntegritySystem.verify(getGameSourceCode());
    } catch (e) {
        // Если кто-то удалил систему защиты или ей некому отправлять код
        if (typeof AntiCode !== 'undefined') {
            AntiCode.authorizeChange(null, () => { // Вызовет ловушку Anti-code из-за null токена
                 document.body.innerHTML = "FATAL";
            });
        }
        document.body.innerHTML = `
            <div style="display:flex; height:100vh; width:100vw; background:#000; color:#ff3333; justify-content:center; align-items:center; flex-direction:column; font-family:monospace; text-align:center;">
                <h1 style="font-size: 40px; margin:0;">[ FATAL ERROR ]</h1>
                <p style="font-size: 24px;">The site has been damaged!</p>
            </div>`;
        setTimeout(() => { window.location.replace("about:blank"); }, 2500);
    }
}, 10000);

// --- САМА ИГРА ---
const canvas = document.getElementById('gameCanvas');
if(canvas) {
    const ctx = canvas.getContext('2d');
    let width, height;

    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
    window.addEventListener('resize', resize); resize();

    const input = { x: 0, y: 0, attack: false, recruit: false };
    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    const joyZone = document.getElementById('joystick-zone');
    const joyKnob = document.getElementById('joystick-knob');
    let joyActive = false, joyCenter = { x: 0, y: 0 };

    if(joyZone) {
        joyZone.addEventListener('touchstart', e => {
            e.preventDefault(); joyActive = true;
            let rect = joyZone.getBoundingClientRect();
            joyCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            updateJoy(e.changedTouches[0]);
        }, {passive: false});
        joyZone.addEventListener('touchmove', e => { if (joyActive) { e.preventDefault(); updateJoy(e.changedTouches[0]); } }, {passive: false});
        joyZone.addEventListener('touchend', e => { e.preventDefault(); joyActive = false; joyKnob.style.transform = `translate(0px, 0px)`; input.x = 0; input.y = 0; });
    }

    function updateJoy(touch) {
        let dx = touch.clientX - joyCenter.x, dy = touch.clientY - joyCenter.y;
        let distance = Math.sqrt(dx*dx + dy*dy), maxDist = 35;
        if (distance > maxDist) { dx = (dx / distance) * maxDist; dy = (dy / distance) * maxDist; }
        joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
        input.x = dx / maxDist; input.y = dy / maxDist;
    }

    const btnAttack = document.getElementById('btn-attack');
    const btnRecruit = document.getElementById('btn-recruit');
    if(btnAttack) {
        btnAttack.addEventListener('touchstart', (e) => { e.preventDefault(); input.attack = true; });
        btnAttack.addEventListener('touchend', (e) => { e.preventDefault(); input.attack = false; });
        btnRecruit.addEventListener('touchstart', (e) => { e.preventDefault(); input.recruit = true; });
        btnRecruit.addEventListener('touchend', (e) => { e.preventDefault(); input.recruit = false; });
    }

    const CAMERA = { x: 0, y: 0 };
    const CHESTNUTS = [];
    const BOTS =[];
    const PHRASES = {
        neutral:["Где мой каштан?", "Просто гуляю...", "Хочу в команду!"],
        ally:["За Босса!", "Держи шишку!", "Слушаюсь!"],
        enemy:["Уничтожить!", "Отдай каштаны!", "Жареные боты..."]
    };

    class Chestnut {
        constructor(x, y, vx, vy, team) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy;
            this.team = team; this.life = 100; this.radius = 8;
        }
        update() { this.x += this.vx; this.y += this.vy; this.life--; }
        draw(ctx) {
            ctx.fillStyle = '#8B4513';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#D2B48C';
            ctx.beginPath(); ctx.arc(this.x - 2, this.y - 2, 3, 0, Math.PI * 2); ctx.fill();
        }
    }

    class Bot {
        constructor(x, y, isPlayer = false) {
            this.x = x; this.y = y; this.isPlayer = isPlayer;
            this.radius = 20; this.speed = isPlayer ? 4 : 2;
            this.team = isPlayer ? 1 : 0;
            if (!isPlayer && Math.random() < 0.3) this.team = 2;
            this.health = 100; this.cooldown = 0;
            this.chatText = ""; this.chatTimer = 0;
        }
        say(text) { this.chatText = text; this.chatTimer = 150; }
        update() {
            if (this.isPlayer) {
                let dx = 0, dy = 0;
                if (keys['KeyW']) dy -= 1; if (keys['KeyS']) dy += 1;
                if (keys['KeyA']) dx -= 1; if (keys['KeyD']) dx += 1;
                if (input.x !== 0 || input.y !== 0) { dx = input.x; dy = input.y; }
                let len = Math.sqrt(dx*dx + dy*dy);
                if (len > 0) { this.x += (dx/len) * this.speed; this.y += (dy/len) * this.speed; }

                if ((keys['Space'] || input.attack) && this.cooldown <= 0) {
                    this.throwChestnut(dx || 1, dy || 0);
                    this.cooldown = 20; this.say("Лови каштан!"); input.attack = false;
                }
                if (keys['KeyE'] || input.recruit) {
                    this.recruit(); keys['KeyE'] = false; input.recruit = false;
                }
            } else {
                if (this.team === 0) {
                    if (Math.random() < 0.02) { this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2; }
                    this.x += this.vx || 0; this.y += this.vy || 0;
                    if (Math.random() < 0.005) this.say(PHRASES.neutral[Math.floor(Math.random() * PHRASES.neutral.length)]);
                } else if (this.team === 1) {
                    let player = BOTS[0];
                    let dist = Math.hypot(player.x - this.x, player.y - this.y);
                    if (dist > 80) { this.x += (player.x - this.x) / dist * this.speed * 0.9; this.y += (player.y - this.y) / dist * this.speed * 0.9; }
                    let enemy = this.findNearest(2);
                    if (enemy && Math.hypot(enemy.x - this.x, enemy.y - this.y) < 300 && this.cooldown <= 0) {
                        this.throwChestnut(enemy.x - this.x, enemy.y - this.y); this.cooldown = 40;
                    }
                    if (Math.random() < 0.005) this.say(PHRASES.ally[Math.floor(Math.random() * PHRASES.ally.length)]);
                } else if (this.team === 2) {
                    let target = this.findNearest(1);
                    if (target) {
                        let dist = Math.hypot(target.x - this.x, target.y - this.y);
                        if (dist > 150) { this.x += (target.x - this.x) / dist * this.speed * 0.8; this.y += (target.y - this.y) / dist * this.speed * 0.8; } 
                        else if (this.cooldown <= 0) { this.throwChestnut(target.x - this.x, target.y - this.y); this.cooldown = 50; }
                    }
                    if (Math.random() < 0.005) this.say(PHRASES.enemy[Math.floor(Math.random() * PHRASES.enemy.length)]);
                }
            }
            if (this.cooldown > 0) this.cooldown--;
            if (this.chatTimer > 0) this.chatTimer--;
            this.x = Math.max(-2000, Math.min(2000, this.x));
            this.y = Math.max(-2000, Math.min(2000, this.y));
        }
        throwChestnut(dx, dy) {
            let len = Math.sqrt(dx*dx + dy*dy);
            CHESTNUTS.push(new Chestnut(this.x, this.y, (dx/len)*10, (dy/len)*10, this.team));
        }
        recruit() {
            for (let i = 1; i < BOTS.length; i++) {
                let b = BOTS[i];
                if (b.team === 0 && Math.hypot(b.x - this.x, b.y - this.y) < 150) {
                    b.team = 1; b.say("Я с тобой, босс!");
                    b.radius += 5; setTimeout(()=> b.radius -=5, 200);
                }
            }
        }
        findNearest(team) {
            let nearest = null, minDist = Infinity;
            for (let b of BOTS) {
                if (b.team === team && b.health > 0) {
                    let d = Math.hypot(b.x - this.x, b.y - this.y);
                    if (d < minDist) { minDist = d; nearest = b; }
                }
            }
            return nearest;
        }
        draw(ctx) {
            ctx.save(); ctx.translate(this.x, this.y);
            if (this.isPlayer) ctx.fillStyle = '#3498db'; else if (this.team === 1) ctx.fillStyle = '#2ecc71';
            else if (this.team === 2) ctx.fillStyle = '#e74c3c'; else ctx.fillStyle = '#95a5a6';
            ctx.beginPath(); ctx.roundRect(-15, -15, 30, 30, 5); ctx.fill();
            ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = '#ecf0f1'; ctx.fillRect(-10, -10, 20, 10);
            ctx.fillStyle = this.team === 2 ? '#c0392b' : '#34495e'; ctx.fillRect(-2, -8, 4, 6);
            if (this.health < 100) { ctx.fillStyle = 'red'; ctx.fillRect(-15, -25, 30, 4); ctx.fillStyle = 'lightgreen'; ctx.fillRect(-15, -25, 30 * (this.health/100), 4); }
            ctx.restore();
            if (this.chatTimer > 0) {
                ctx.font = "bold 14px sans-serif"; let tw = ctx.measureText(this.chatText).width;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'; ctx.beginPath();
                ctx.roundRect(this.x - tw/2 - 10, this.y - 50, tw + 20, 25, 5); ctx.fill();
                ctx.strokeStyle = '#333'; ctx.stroke(); ctx.fillStyle = '#000';
                ctx.textAlign = 'center'; ctx.fillText(this.chatText, this.x, this.y - 33);
            }
        }
    }

    const player = new Bot(0, 0, true); BOTS.push(player);
    for (let i = 0; i < 40; i++) BOTS.push(new Bot((Math.random() - 0.5) * 3000, (Math.random() - 0.5) * 3000));

    function loop() {
        if (!document.getElementById('gameCanvas')) return; // Остановка если SIS крашнул сайт

        ctx.fillStyle = '#8fbf73'; ctx.fillRect(0, 0, width, height);
        CAMERA.x = player.x - width / 2; CAMERA.y = player.y - height / 2;

        ctx.save(); ctx.translate(-CAMERA.x, -CAMERA.y);

        ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
        let startX = Math.floor(CAMERA.x / 100) * 100, startY = Math.floor(CAMERA.y / 100) * 100;
        for (let i = startX; i < startX + width + 100; i += 100) { ctx.beginPath(); ctx.moveTo(i, CAMERA.y); ctx.lineTo(i, CAMERA.y + height); ctx.stroke(); }
        for (let i = startY; i < startY + height + 100; i += 100) { ctx.beginPath(); ctx.moveTo(CAMERA.x, i); ctx.lineTo(CAMERA.x + width, i); ctx.stroke(); }

        for (let i = CHESTNUTS.length - 1; i >= 0; i--) {
            let c = CHESTNUTS[i]; c.update(); c.draw(ctx);
            for (let b of BOTS) {
                if (b.team !== c.team && b.team !== 0 && c.team !== 0) {
                    if (Math.hypot(b.x - c.x, b.y - c.y) < b.radius + c.radius) {
                        b.health -= 25; b.say("Ай!"); c.life = 0; break;
                    }
                }
            }
            if (c.life <= 0) CHESTNUTS.splice(i, 1);
        }

        for (let i = BOTS.length - 1; i >= 0; i--) {
            let b = BOTS[i]; b.update(); b.draw(ctx);
            if (b.health <= 0) {
                BOTS.splice(i, 1);
                if (!b.isPlayer) BOTS.push(new Bot(player.x + (Math.random()-0.5)*1000, player.y + (Math.random()-0.5)*1000));
            }
        }

        ctx.beginPath(); ctx.arc(player.x, player.y, 150, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(52, 152, 219, 0.2)'; ctx.lineWidth = 2; ctx.stroke();
        ctx.restore();

        requestAnimationFrame(loop);
    }
    loop();
}
</script>
</body>
