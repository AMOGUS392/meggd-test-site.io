<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiverse Arena: Top-Down</title>
    <style>
        /* ================= АРХИТЕКТУРА И UI ================= */
        :root { --ui-bg: rgba(10, 15, 30, 0.8); --text: #fff; --neon: #0ff; }
        * { box-sizing: border-box; user-select: none; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        canvas { display: block; width: 100%; height: 100%; }

        /* Экраны */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 100; color: white; }
        .screen.active { display: flex; }
        h1 { font-size: 3rem; text-shadow: 0 0 20px var(--neon); text-transform: uppercase; text-align: center; }
        
        .char-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .char-card { background: var(--ui-bg); border: 2px solid #333; padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s; text-align: center; width: 180px; }
        .char-card:hover { border-color: var(--neon); transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,255,255,0.2); }
        .char-card h3 { margin: 0 0 10px 0; }
        .color-preview { width: 50px; height: 50px; border-radius: 50%; margin: 0 auto 10px; box-shadow: 0 0 15px currentColor; }

        /* Игровой HUD */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        
        /* Статусы игрока */
        .player-stats { position: absolute; top: 20px; left: 20px; background: var(--ui-bg); padding: 15px; border-radius: 10px; border-left: 4px solid var(--neon); pointer-events: auto; }
        .bar-bg { width: 200px; height: 15px; background: #222; border-radius: 8px; margin-top: 5px; overflow: hidden; }
        .bar-fill { height: 100%; width: 100%; transition: 0.2s; }
        #hp-fill { background: linear-gradient(90deg, #f00, #ff5555); }
        
        /* Мобильный Джойстик */
        #joystick-zone { position: absolute; bottom: 30px; left: 30px; width: 150px; height: 150px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; display: none; border: 2px solid rgba(255,255,255,0.2); }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; background: rgba(0,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 0 20px rgba(0,255,255,0.5); }

        /* Панель Способностей */
        .ability-bar { position: absolute; bottom: 30px; right: 30px; display: flex; gap: 15px; pointer-events: auto; }
        .ability-btn { width: 70px; height: 70px; border-radius: 50%; background: var(--ui-bg); border: 2px solid #555; color: white; font-size: 1.5rem; font-weight: bold; position: relative; overflow: hidden; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .ability-btn.active { border-color: var(--neon); box-shadow: 0 0 20px var(--neon); }
        .cooldown-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: rgba(0,0,0,0.7); transition: height 0.1s linear; display: flex; justify-content: center; align-items: center; font-size: 1rem; }

        @media (max-width: 768px) {
            #joystick-zone { display: block; }
            .ability-btn { width: 60px; height: 60px; }
            .bar-bg { width: 150px; }
        }
        
        .msg-popup { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; color: #fff; text-shadow: 0 0 10px #f00; pointer-events: none; opacity: 0; transition: 0.5s; font-weight: bold; z-index: 50; }
    </style>
</head>
<body>

    <!-- Меню Выбора Персонажа -->
    <div id="menu-screen" class="screen active">
        <h1>Выберите Легенду</h1>
        <p>ПК: WASD + Мышь (ЛКМ/ПКМ/Пробел) | Смартфон: Джойстик + Кнопки</p>
        <div class="char-grid" id="char-selector">
            <!-- Генерируется через JS -->
        </div>
    </div>

    <!-- Экран смерти -->
    <div id="death-screen" class="screen">
        <h1 style="color: red;">ВЫ ПОГИБЛИ</h1>
        <button onclick="location.reload()" style="padding: 15px 30px; font-size: 1.5rem; background: #222; color: white; border: 2px solid red; border-radius: 10px; cursor: pointer;">ПЕРЕЗАГРУЗКА</button>
    </div>

    <!-- Игровой UI -->
    <div id="ui-layer">
        <div class="player-stats">
            <div style="font-weight:bold; font-size: 1.2rem;" id="player-name">Игрок</div>
            <div>Убито Боссов: <span id="score-text">0</span></div>
            <div class="bar-bg"><div class="bar-fill" id="hp-fill"></div></div>
        </div>

        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>

        <div class="ability-bar" id="abilities-container">
            <!-- Кнопки генерируются под персонажа -->
        </div>
    </div>

    <div class="msg-popup" id="center-msg"></div>

    <!-- Основной Canvas -->
    <canvas id="gameCanvas"></canvas>

<script>
/**
 * MULTIVERSE ARENA ENGINE
 * Массивный движок для Top-Down Action RPG.
 */

// ================= UTILS & MATH =================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
});

class Vec2 {
    constructor(x, y) { this.x = x; this.y = y; }
    add(v) { return new Vec2(this.x + v.x, this.y + v.y); }
    sub(v) { return new Vec2(this.x - v.x, this.y - v.y); }
    mult(n) { return new Vec2(this.x * n, this.y * n); }
    mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
    normalize() { let m = this.mag(); return m === 0 ? new Vec2(0,0) : new Vec2(this.x/m, this.y/m); }
    dist(v) { return this.sub(v).mag(); }
}

function rand(min, max) { return Math.random() * (max - min) + min; }

// ================= INPUT SYSTEM =================
const Input = {
    keys: {},
    mouse: new Vec2(width/2, height/2),
    mouseDown: false,
    joyVector: new Vec2(0, 0),
    isMobile: /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent),
    
    init() {
        window.addEventListener('keydown', e => this.keys[e.code] = true);
        window.addEventListener('keyup', e => this.keys[e.code] = false);
        window.addEventListener('mousemove', e => { this.mouse.x = e.clientX; this.mouse.y = e.clientY; });
        window.addEventListener('mousedown', e => { this.mouseDown = true; if(!this.isMobile) game.tryUseAbility(0); });
        window.addEventListener('mouseup', e => this.mouseDown = false);
        window.addEventListener('contextmenu', e => { e.preventDefault(); if(!this.isMobile) game.tryUseAbility(1); });

        // Джойстик
        const jZone = document.getElementById('joystick-zone');
        const jKnob = document.getElementById('joystick-knob');
        let jCenter = new Vec2(0,0);

        const handleTouch = (e) => {
            e.preventDefault();
            let touch = e.targetTouches[0];
            if (!touch) return;
            let rect = jZone.getBoundingClientRect();
            jCenter = new Vec2(rect.left + rect.width/2, rect.top + rect.height/2);
            let tPos = new Vec2(touch.clientX, touch.clientY);
            let dir = tPos.sub(jCenter);
            if (dir.mag() > 50) dir = dir.normalize().mult(50);
            
            jKnob.style.transform = `translate(calc(-50% + ${dir.x}px), calc(-50% + ${dir.y}px))`;
            this.joyVector = dir.normalize();
        };

        jZone.addEventListener('touchstart', handleTouch);
        jZone.addEventListener('touchmove', handleTouch);
        jZone.addEventListener('touchend', (e) => {
            e.preventDefault();
            jKnob.style.transform = `translate(-50%, -50%)`;
            this.joyVector = new Vec2(0,0);
        });
    },

    getMovementDir() {
        if (this.joyVector.mag() > 0.1) return this.joyVector;
        let dir = new Vec2(0, 0);
        if (this.keys['KeyW']) dir.y -= 1;
        if (this.keys['KeyS']) dir.y += 1;
        if (this.keys['KeyA']) dir.x -= 1;
        if (this.keys['KeyD']) dir.x += 1;
        return dir.normalize();
    },

    getAimDir(playerPos) {
        if (this.isMobile) {
            // На мобилках целимся туда же, куда идем, либо в ближайшего врага
            let nearest = null;
            let minDist = 500;
            for(let e of game.enemies) {
                let d = e.pos.dist(playerPos);
                if (d < minDist) { minDist = d; nearest = e; }
            }
            if (nearest) return nearest.pos.sub(playerPos).normalize();
            return this.getMovementDir().mag() > 0 ? this.getMovementDir() : new Vec2(1, 0);
        } else {
            // На ПК целимся мышкой
            let screenPlayerPos = new Vec2(width/2, height/2); // Камера всегда по центру
            return this.mouse.sub(screenPlayerPos).normalize();
        }
    }
};

// ================= GAME CONTENT & ABILITIES =================

// База данных эффектов и способностей
const Abilities = {
    // === GOJO ===
    InfinityPunch: {
        name: "Удар Бесконечности", cd: 0.5, color: "#fff",
        execute: (caster, aimDir) => {
            game.addProjectile(caster, caster.pos.add(aimDir.mult(30)), aimDir, 15, 15, 20, "#fff", "melee");
        }
    },
    CursedRed: {
        name: "Красный", cd: 4, color: "#f00",
        execute: (caster, aimDir) => {
            game.addParticleExplosion(caster.pos, "#f00", 30);
            game.addProjectile(caster, caster.pos.add(aimDir.mult(40)), aimDir, 8, 30, 50, "#f00", "blast");
        }
    },
    HollowPurple: {
        name: "Фиолетовый", cd: 10, color: "#8a2be2",
        execute: (caster, aimDir) => {
            game.showPopup("HOLLOW PURPLE!", "#8a2be2");
            game.shake = 20;
            // Медленный, огромный, всепробивающий
            let p = game.addProjectile(caster, caster.pos, aimDir, 4, 80, 150, "#8a2be2", "pierce");
            p.lifespan = 200; // летит далеко
        }
    },

    // === SUKUNA ===
    Dismantle: {
        name: "Разрез", cd: 0.3, color: "#ff2222",
        execute: (caster, aimDir) => {
            let spread = (Math.random() - 0.5) * 0.5;
            let dir = new Vec2(aimDir.x * Math.cos(spread) - aimDir.y * Math.sin(spread),
                               aimDir.x * Math.sin(spread) + aimDir.y * Math.cos(spread));
            game.addProjectile(caster, caster.pos, dir, 25, 10, 15, "#ff0000", "slash");
        }
    },
    FireArrow: {
        name: "Огненная Стрела", cd: 8, color: "#ff8800",
        execute: (caster, aimDir) => {
            game.showPopup("FUUGA...", "#ff8800");
            let p = game.addProjectile(caster, caster.pos, aimDir, 18, 20, 100, "#ff8800", "explosive");
            p.lifespan = 100;
        }
    },

    // === SANS ===
    BoneThrow: {
        name: "Кость", cd: 0.6, color: "#fff",
        execute: (caster, aimDir) => {
            game.addProjectile(caster, caster.pos, aimDir, 12, 12, 25, "#fff", "bone");
        }
    },
    GasterBlaster: {
        name: "Бластер", cd: 6, color: "#00ffff",
        execute: (caster, aimDir) => {
            game.showPopup("Gaster Blaster!", "#00ffff");
            // Луч: создаем серию невидимых прожектайлов или один длинный хитбокс
            for(let i=1; i<=15; i++) {
                setTimeout(() => {
                    game.addProjectile(caster, caster.pos.add(aimDir.mult(i*40)), aimDir, 0.1, 40, 30, "#00ffff", "beam");
                    game.addParticleExplosion(caster.pos.add(aimDir.mult(i*40)), "#00ffff", 5);
                }, i * 20);
            }
            game.shake = 10;
        }
    },

    // === CUPHEAD ===
    Peashooter: {
        name: "Выстрел", cd: 0.15, color: "#00ccff",
        execute: (caster, aimDir) => {
            game.addProjectile(caster, caster.pos, aimDir, 15, 8, 10, "#00ccff", "bullet");
        }
    },
    MegaBlast: {
        name: "Мега Бласт", cd: 5, color: "#ff0000",
        execute: (caster, aimDir) => {
            game.addProjectile(caster, caster.pos, aimDir, 20, 25, 60, "#ff0000", "bullet");
            game.addProjectile(caster, caster.pos, aimDir.add(new Vec2(0.2,0.2)).normalize(), 18, 15, 40, "#ff0000", "bullet");
            game.addProjectile(caster, caster.pos, aimDir.add(new Vec2(-0.2,-0.2)).normalize(), 18, 15, 40, "#ff0000", "bullet");
        }
    }
};

const CHARACTERS = {
    "Gojo": { color: "#8a2be2", hp: 1000, speed: 6, size: 25, abilities:[Abilities.InfinityPunch, Abilities.CursedRed, Abilities.HollowPurple] },
    "Sukuna": { color: "#ff2222", hp: 1200, speed: 7, size: 25, abilities:[Abilities.Dismantle, Abilities.FireArrow] },
    "Sans": { color: "#ffffff", hp: 300, speed: 8, size: 20, abilities:[Abilities.BoneThrow, Abilities.GasterBlaster] },
    "Cuphead": { color: "#ff0000", hp: 600, speed: 6, size: 22, abilities:[Abilities.Peashooter, Abilities.MegaBlast] },
    "Frisk": { color: "#ff00ff", hp: 800, speed: 5, size: 20, abilities: [Abilities.BoneThrow] }, // Упрощенный
    "Mob": { color: "#555555", hp: 100, speed: 3, size: 20, abilities: [Abilities.InfinityPunch] } // Базовый враг
};

// ================= CLASSES =================

class Camera {
    constructor() { this.pos = new Vec2(0,0); }
    update(targetPos) {
        // Плавное следование
        this.pos.x += (targetPos.x - width/2 - this.pos.x) * 0.1;
        this.pos.y += (targetPos.y - height/2 - this.pos.y) * 0.1;
    }
}

class Entity {
    constructor(x, y, profile, isPlayer = false) {
        this.pos = new Vec2(x, y);
        this.vel = new Vec2(0, 0);
        this.profile = profile;
        this.hp = profile.hp;
        this.maxHp = profile.hp;
        this.speed = profile.speed;
        this.size = profile.size;
        this.color = profile.color;
        this.isPlayer = isPlayer;
        this.cooldowns = [0, 0, 0]; // Для 3-х скиллов
        
        // Для анимации
        this.damageFlash = 0;
    }

    update(dt) {
        this.pos = this.pos.add(this.vel);
        this.vel = this.vel.mult(0.8); // Трение

        // Границы мира (3000 x 3000)
        this.pos.x = Math.max(0, Math.min(3000, this.pos.x));
        this.pos.y = Math.max(0, Math.min(3000, this.pos.y));

        for(let i=0; i<this.cooldowns.length; i++) {
            if(this.cooldowns[i] > 0) this.cooldowns[i] -= dt;
        }
        if(this.damageFlash > 0) this.damageFlash -= dt;
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.pos.x, this.pos.y);

        // Тень
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.beginPath();
        ctx.ellipse(0, this.size, this.size, this.size/2, 0, 0, Math.PI*2);
        ctx.fill();

        // Тело
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.damageFlash > 0 ? "#fff" : this.color;
        
        // Стилизация отрисовки в зависимости от персонажа
        ctx.beginPath();
        if (this.color === "#ffffff") { // Sans
            ctx.arc(0, 0, this.size, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#000";
            ctx.fillRect(-8, -5, 6, 8); // глаз
            ctx.fillRect(2, -5, 6, 8); // глаз
        } else {
            // Стандартный квадрат/ромб
            ctx.roundRect(-this.size, -this.size, this.size*2, this.size*2, 8);
            ctx.fill();
        }

        // Полоска ХП (для врагов)
        if (!this.isPlayer) {
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#222";
            ctx.fillRect(-this.size, -this.size - 15, this.size*2, 6);
            ctx.fillStyle = "#f00";
            let hpW = (this.hp / this.maxHp) * (this.size*2);
            ctx.fillRect(-this.size, -this.size - 15, hpW, 6);
        }

        ctx.restore();
    }

    takeDamage(amt, sourceDir) {
        this.hp -= amt;
        this.damageFlash = 0.1;
        this.vel = this.vel.add(sourceDir.mult(10)); // Отбрасывание
        game.addFloatingText(Math.floor(amt), this.pos);
        if (this.hp <= 0 && !this.isPlayer) {
            game.addParticleExplosion(this.pos, this.color, 50);
            if(this.profile !== CHARACTERS["Mob"]) game.bossesKilled++;
            document.getElementById('score-text').innerText = game.bossesKilled;
        }
    }
}

class Projectile {
    constructor(owner, pos, dir, speed, size, damage, color, type) {
        this.owner = owner;
        this.pos = pos;
        this.dir = dir;
        this.vel = dir.mult(speed);
        this.size = size;
        this.damage = damage;
        this.color = color;
        this.type = type;
        this.lifespan = 50; // в тиках
        this.markedForDeletion = false;
        this.hitEntities = new Set(); // для pierce
    }

    update() {
        this.pos = this.pos.add(this.vel);
        this.lifespan--;
        if(this.lifespan <= 0) this.markedForDeletion = true;

        if (this.type === "blast") this.size += 1;

        // Создание красивого следа
        if (Math.random() < 0.5) {
            game.particles.push(new Particle(this.pos.x, this.pos.y, this.color, rand(2, this.size/2)));
        }

        // Коллизии
        let targets = this.owner.isPlayer ? game.enemies : [game.player];
        for(let t of targets) {
            if (t.hp > 0 && !this.hitEntities.has(t)) {
                if (this.pos.dist(t.pos) < this.size + t.size) {
                    t.takeDamage(this.damage, this.dir);
                    this.hitEntities.add(t);
                    
                    if (this.type === "explosive") {
                        game.addParticleExplosion(this.pos, "#ff5500", 40);
                        game.shake = 10;
                        this.markedForDeletion = true;
                    } else if (this.type !== "pierce" && this.type !== "beam") {
                        this.markedForDeletion = true;
                    }
                    game.addParticleExplosion(this.pos, this.color, 10);
                }
            }
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.pos.x, this.pos.y);
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        
        ctx.beginPath();
        if (this.type === "slash") {
            ctx.rotate(Math.atan2(this.dir.y, this.dir.x));
            ctx.arc(0, 0, this.size, -Math.PI/4, Math.PI/4);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 5;
            ctx.stroke();
        } else if (this.type === "beam") {
            ctx.fillRect(-this.size, -this.size, this.size*2, this.size*2);
        } else {
            ctx.arc(0, 0, this.size, 0, Math.PI*2);
            ctx.fill();
            if (this.type === "pierce") {
                ctx.fillStyle = "#000";
                ctx.arc(0, 0, this.size * 0.5, 0, Math.PI*2);
                ctx.fill();
            }
        }
        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color, size) {
        this.pos = new Vec2(x, y);
        this.vel = new Vec2(rand(-5, 5), rand(-5, 5));
        this.color = color;
        this.size = size;
        this.life = 1.0;
        this.decay = rand(0.02, 0.05);
    }
    update() {
        this.pos = this.pos.add(this.vel);
        this.vel = this.vel.mult(0.9);
        this.life -= this.decay;
    }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, this.size, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

class FloatingText {
    constructor(text, pos) {
        this.text = text;
        this.pos = new Vec2(pos.x + rand(-20,20), pos.y - 30);
        this.life = 1.0;
    }
    update() {
        this.pos.y -= 1;
        this.life -= 0.02;
    }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 20px Arial";
        ctx.fillText(this.text, this.pos.x, this.pos.y);
        ctx.globalAlpha = 1.0;
    }
}

// ================= MAIN GAME ENGINE =================

const game = {
    state: 'menu', // menu, play, dead
    player: null,
    enemies: [],
    projectiles: [],
    particles: [],
    texts:[],
    camera: new Camera(),
    lastTime: 0,
    shake: 0,
    bossesKilled: 0,

    init() {
        Input.init();
        this.buildMenu();
        requestAnimationFrame(t => this.loop(t));
    },

    buildMenu() {
        const sel = document.getElementById('char-selector');
        sel.innerHTML = '';
        for (let name in CHARACTERS) {
            if (name === "Mob") continue;
            let c = CHARACTERS[name];
            let card = document.createElement('div');
            card.className = 'char-card';
            card.innerHTML = `
                <div class="color-preview" style="background:${c.color}"></div>
                <h3>${name}</h3>
                <small>HP: ${c.hp}</small>
            `;
            card.onclick = () => this.startGame(name);
            sel.appendChild(card);
        }
    },

    startGame(charName) {
        document.getElementById('menu-screen').classList.remove('active');
        document.getElementById('ui-layer').style.display = 'block';
        
        let profile = CHARACTERS[charName];
        this.player = new Entity(1500, 1500, profile, true);
        document.getElementById('player-name').innerText = charName;
        document.getElementById('player-name').style.color = profile.color;

        // Построение панели скиллов
        const abCont = document.getElementById('abilities-container');
        abCont.innerHTML = '';
        profile.abilities.forEach((ab, i) => {
            let btn = document.createElement('div');
            btn.className = 'ability-btn';
            btn.style.borderColor = ab.color;
            // Иконка (текст)
            btn.innerHTML = `<span>${i==0?'ATK':(i==1?'S1':'S2')}</span><div class="cooldown-overlay" id="cd-${i}"></div>`;
            
            // Бинд кнопок
            const trigger = (e) => { e.preventDefault(); this.tryUseAbility(i); };
            btn.addEventListener('touchstart', trigger);
            btn.addEventListener('mousedown', trigger);
            
            abCont.appendChild(btn);
        });

        this.enemies = [];
        this.projectiles =[];
        this.particles = [];
        this.texts =[];
        this.bossesKilled = 0;
        
        this.spawnWorld();
        this.state = 'play';
    },

    spawnWorld() {
        // Спавн мобов
        for(let i=0; i<30; i++) {
            this.enemies.push(new Entity(rand(100, 2900), rand(100, 2900), CHARACTERS["Mob"], false));
        }
        // Спавн боссов (остальные персонажи)
        for (let name in CHARACTERS) {
            if (name === "Mob" || name === document.getElementById('player-name').innerText) continue;
            this.enemies.push(new Entity(rand(500, 2500), rand(500, 2500), CHARACTERS[name], false));
        }
    },

    tryUseAbility(index) {
        if(this.state !== 'play') return;
        let ab = this.player.profile.abilities[index];
        if(!ab || this.player.cooldowns[index] > 0) return;

        let aimDir = Input.getAimDir(this.player.pos);
        ab.execute(this.player, aimDir);
        this.player.cooldowns[index] = ab.cd; // Установка КД в секундах
    },

    addProjectile(owner, pos, dir, speed, size, dmg, color, type) {
        let p = new Projectile(owner, pos, dir, speed, size, dmg, color, type);
        this.projectiles.push(p);
        return p;
    },

    addParticleExplosion(pos, color, count) {
        for(let i=0; i<count; i++) {
            this.particles.push(new Particle(pos.x, pos.y, color, rand(3, 8)));
        }
    },

    addFloatingText(text, pos) {
        this.texts.push(new FloatingText(text, pos));
    },

    showPopup(text, color) {
        const msg = document.getElementById('center-msg');
        msg.innerText = text;
        msg.style.color = color;
        msg.style.textShadow = `0 0 20px ${color}`;
        msg.style.opacity = 1;
        msg.style.transform = "translate(-50%, -50%) scale(1.5)";
        setTimeout(() => { msg.style.opacity = 0; msg.style.transform = "translate(-50%, -50%) scale(1)"; }, 1500);
    },

    updateAI(enemy, dt) {
        let dist = enemy.pos.dist(this.player.pos);
        if (dist < 800) { // Агро радиус
            let dir = this.player.pos.sub(enemy.pos).normalize();
            
            // Движение к игроку
            if (dist > 200) {
                enemy.vel = enemy.vel.add(dir.mult(enemy.speed * 0.1));
            } else if (dist < 100) {
                enemy.vel = enemy.vel.add(dir.mult(-enemy.speed * 0.1)); // Отступление
            }

            // Использование способностей ИИ
            enemy.profile.abilities.forEach((ab, i) => {
                if (enemy.cooldowns[i] <= 0 && Math.random() < 0.05) { // Шанс каста
                    // Упреждение цели
                    let aim = dir;
                    if (Math.random() < 0.5) aim = this.player.pos.add(this.player.vel.mult(10)).sub(enemy.pos).normalize();
                    ab.execute(enemy, aim);
                    enemy.cooldowns[i] = ab.cd + rand(1, 3); // ИИ кастует реже
                }
            });
        }
    },

    loop(timestamp) {
        const dt = Math.min((timestamp - this.lastTime) / 1000, 0.1);
        this.lastTime = timestamp;

        if (this.state === 'play') {
            this.update(dt);
            this.draw();
        }

        requestAnimationFrame(t => this.loop(t));
    },

    update(dt) {
        // Управление Игроком
        let moveDir = Input.getMovementDir();
        if (moveDir.mag() > 0) {
            this.player.vel = this.player.vel.add(moveDir.mult(this.player.speed * 0.1)); // Ускорение
        }
        this.player.update(dt);

        // Обновление Камеры
        this.camera.update(this.player.pos);

        // Спам автоатаки если зажата мышь на ПК
        if(Input.mouseDown && !Input.isMobile) {
            this.tryUseAbility(0);
        }

        // Обновление Врагов
        for (let i = this.enemies.length - 1; i >= 0; i--) {
            let e = this.enemies[i];
            this.updateAI(e, dt);
            e.update(dt);
            if (e.hp <= 0) this.enemies.splice(i, 1);
        }

        // Спавн новых мобов для массовки
        if (this.enemies.length < 20 && Math.random() < 0.01) {
            this.enemies.push(new Entity(rand(100, 2900), rand(100, 2900), CHARACTERS["Mob"], false));
        }

        // Projectiles
        for (let i = this.projectiles.length - 1; i >= 0; i--) {
            let p = this.projectiles[i];
            p.update();
            if (p.markedForDeletion) this.projectiles.splice(i, 1);
        }

        // Particles
        for (let i = this.particles.length - 1; i >= 0; i--) {
            let p = this.particles[i];
            p.update();
            if (p.life <= 0) this.particles.splice(i, 1);
        }

        // Texts
        for (let i = this.texts.length - 1; i >= 0; i--) {
            let t = this.texts[i];
            t.update();
            if (t.life <= 0) this.texts.splice(i, 1);
        }

        // Shake
        if (this.shake > 0) this.shake *= 0.9;
        if (this.shake < 0.5) this.shake = 0;

        // UI Updates
        document.getElementById('hp-fill').style.width = Math.max(0, (this.player.hp / this.player.maxHp) * 100) + '%';
        this.player.profile.abilities.forEach((ab, i) => {
            let cdRatio = this.player.cooldowns[i] / ab.cd;
            let el = document.getElementById('cd-' + i);
            if(el) el.style.height = (cdRatio * 100) + '%';
        });

        // Смерть
        if (this.player.hp <= 0) {
            this.state = 'dead';
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('death-screen').classList.add('active');
        }
    },

    draw() {
        // Очистка
        ctx.fillStyle = "#050510";
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        
        // Применение Камеры и Тряски
        let sx = (Math.random() - 0.5) * this.shake;
        let sy = (Math.random() - 0.5) * this.shake;
        ctx.translate(width/2 - this.camera.pos.x + sx, height/2 - this.camera.pos.y + sy);

        // Рисуем сетку мира (Стиль Киберпанк/Арена)
        ctx.strokeStyle = "rgba(0, 255, 255, 0.05)";
        ctx.lineWidth = 2;
        const gridSize = 100;
        let startX = Math.floor((this.camera.pos.x - width/2) / gridSize) * gridSize;
        let startY = Math.floor((this.camera.pos.y - height/2) / gridSize) * gridSize;
        
        ctx.beginPath();
        for(let x = startX; x < startX + width + gridSize; x += gridSize) {
            if(x >= 0 && x <= 3000) { ctx.moveTo(x, 0); ctx.lineTo(x, 3000); }
        }
        for(let y = startY; y < startY + height + gridSize; y += gridSize) {
            if(y >= 0 && y <= 3000) { ctx.moveTo(0, y); ctx.lineTo(3000, y); }
        }
        ctx.stroke();
        
        // Границы мира
        ctx.strokeStyle = "#ff0055";
        ctx.lineWidth = 5;
        ctx.strokeRect(0, 0, 3000, 3000);

        // Включаем красивое смешивание для эффектов
        ctx.globalCompositeOperation = 'lighter';

        // Рисуем партиклы
        for (let p of this.particles) p.draw(ctx);

        // Рисуем прожектайлы
        for (let p of this.projectiles) p.draw(ctx);

        // Выключаем смешивание для четкой отрисовки тел
        ctx.globalCompositeOperation = 'source-over';

        // Рисуем сущности (Сортировка по Y для псевдо-3D)
        let renderQueue = [this.player, ...this.enemies].sort((a,b) => a.pos.y - b.pos.y);
        for (let e of renderQueue) e.draw(ctx);

        // Текст урона
        for (let t of this.texts) t.draw(ctx);

        ctx.restore();
    }
};

// Start
game.init();

</script>
